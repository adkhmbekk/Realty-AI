# Настройки линтера ruff (быстрая проверка кода Python).
# Набор правил соответствует разумному минимуму: реальные ошибки (неопределённые
# имена, неиспользуемые импорты, синтаксис), без придирок к стилю/длине строк.
target-version = "py311"
line-length = 100

[lint]
select = ["E4", "E7", "E9", "F"]
