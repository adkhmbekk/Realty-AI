# docker-compose описывает все части системы и как их запускать вместе.
# Команда `docker compose up` поднимет всё, что здесь перечислено.
#
# Часть 1C-1: добавился веб-сервер (web), который отдаёт страницу приложения
# и соединяет её с backend. Теперь частей три: db, backend, web.

services:
  # ─── База данных PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: realty
      POSTGRES_PASSWORD: realty_local_dev
      POSTGRES_DB: realty
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty -d realty"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Backend (FastAPI) ──────────────────────────────────────────────────
  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://realty:realty_local_dev@db:5432/realty
      BOT_TOKEN: ${BOT_TOKEN:-}
      SUPERADMIN_TELEGRAM_ID: ${SUPERADMIN_TELEGRAM_ID:-}
      JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Веб-сервер (страница приложения + проксирование к API) ─────────────
  web:
    image: caddy:2
    ports:
      # Открой http://localhost:8080 в браузере, чтобы увидеть приложение.
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./frontend:/srv:ro
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Туннель (публичный HTTPS-адрес для Telegram) ───────────────────────
  # Создаёт временный публичный адрес вида https://xxx.trycloudflare.com,
  # который ведёт на наш веб-сервер. Telegram умеет открывать только HTTPS,
  # а наш компьютер из интернета не виден — туннель решает обе проблемы.
  # Адрес меняется при каждом перезапуске (для разработки это нормально).
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --url http://web:80
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
