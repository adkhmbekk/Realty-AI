# docker-compose описывает все части системы и как их запускать вместе.
# Команда `docker compose up` поднимет всё, что здесь перечислено.
#
# Часть 1B: backend + база данных. Настройки входа (токен бота и т.п.)
# берутся из файла .env, если он есть рядом. Если файла нет — подставляются
# пустые значения, и проект всё равно запускается.

services:
  # ─── База данных PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: realty
      POSTGRES_PASSWORD: realty_local_dev
      POSTGRES_DB: realty
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty -d realty"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Backend (FastAPI) ──────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://realty:realty_local_dev@db:5432/realty
      # Значения ниже берутся из файла .env (если он есть). Если переменная
      # не задана — подставляется пустая строка, и backend это нормально учтёт.
      BOT_TOKEN: ${BOT_TOKEN:-}
      SUPERADMIN_TELEGRAM_ID: ${SUPERADMIN_TELEGRAM_ID:-}
      JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
