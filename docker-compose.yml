# docker-compose описывает все части системы и как их запускать вместе.
# Команда `docker compose up` поднимет всё, что здесь перечислено.
#
# Часть 1C-1: добавился веб-сервер (web), который отдаёт страницу приложения
# и соединяет её с backend. Теперь частей три: db, backend, web.

services:
  # ─── База данных PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16
    mem_limit: 1024m
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-realty}
      # Пароль ОБЯЗАТЕЛЬНО задаётся через .env (POSTGRES_PASSWORD). Значения по
      # умолчанию НЕТ намеренно: запуск с пустым/дефолтным паролем недопустим.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Задай POSTGRES_PASSWORD в .env (надёжный случайный пароль).}
      POSTGRES_DB: ${POSTGRES_DB:-realty}
    # Порт НАРУЖУ не публикуем: база доступна только из внутренней сети Docker
    # (сервисам backend/backup). Если для локальной отладки нужен доступ из
    # pgAdmin/DBeaver — добавь публикацию порта в docker-compose.override.yml
    # (этот файл локальный и не коммитится), напр.:
    #   services: { db: { ports: ["127.0.0.1:5432:5432"] } }
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-realty} -d ${POSTGRES_DB:-realty}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Backend (FastAPI) ──────────────────────────────────────────────────
  backend:
    build: ./backend
    mem_limit: 1024m
    # Порт 8000 НАРУЖУ не публикуем: доступ к API идёт только через веб-сервер
    # (Caddy), который выставляет наружу лишь /api/* и /health. Это убирает
    # прямой доступ к API и интерактивной документации в обход прокси.
    # Для локальной отладки можно опубликовать порт в docker-compose.override.yml.
    expose:
      - "8000"
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-realty}:${POSTGRES_PASSWORD:?Задай POSTGRES_PASSWORD в .env.}@db:5432/${POSTGRES_DB:-realty}
      BOT_TOKEN: ${BOT_TOKEN:-}
      SUPERADMIN_TELEGRAM_ID: ${SUPERADMIN_TELEGRAM_ID:-}
      JWT_SECRET: ${JWT_SECRET:-}
      BOT_USERNAME: ${BOT_USERNAME:-}
      SUBSCRIPTION_WARN_DAYS: ${SUBSCRIPTION_WARN_DAYS:-3}
      ERROR_ALERTS_ENABLED: ${ERROR_ALERTS_ENABLED:-true}
      # Документация (/docs) по умолчанию выключена. Включить локально: true.
      ENABLE_DOCS: ${ENABLE_DOCS:-false}
      # Папка секретов — отдельный том, НЕ совпадающий с папкой фото и НЕ
      # попадающий в бэкапы (там автогенерируемый JWT_SECRET).
      SECRET_DIR: /secrets
    volumes:
      # Загруженные фото объектов хранятся здесь и переживают перезапуски.
      - photos_data:/data/photos
      # Секреты приложения (отдельный том, в бэкап НЕ копируется).
      - secrets_data:/secrets
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Liveness: процесс отвечает на /health (200). Деградация БД/хранилища
      # видна в теле ответа, но процесс жив — этого достаточно для авто-восстановления.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s
    restart: unless-stopped

  # ─── Авто-бэкапы по расписанию ──────────────────────────────────────────
  # Отдельный лёгкий сервис на образе postgres:16 (в нём есть pg_dump нужной
  # версии). По расписанию делает копию базы и фотографий в папку backups\ в
  # том же формате, что и ручной backup.bat (метка auto-ГГГГ-ММ-ДД_ЧЧ-ММ-СС),
  # поэтому такие копии можно восстановить тем же restore.bat. Старые авто-копии
  # автоматически чистятся (хранится последних BACKUP_KEEP штук).
  backup:
    image: postgres:16
    mem_limit: 512m
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?Задай POSTGRES_PASSWORD в .env.}
      DB_HOST: db
      DB_USER: ${POSTGRES_USER:-realty}
      DB_NAME: ${POSTGRES_DB:-realty}
      # Как часто делать копию (часов) и сколько последних копий хранить.
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
      BACKUP_KEEP: ${BACKUP_KEEP:-7}
    volumes:
      # Копии складываются в папку backups\ рядом с проектом (как у backup.bat).
      - ./backups:/backups
      # Фотографии монтируем только для чтения — копировать можно, менять нельзя.
      - photos_data:/data/photos:ro
      # Сам скрипт расписания.
      - ./scripts/auto_backup.sh:/auto_backup.sh:ro
    entrypoint: ["/bin/sh", "/auto_backup.sh"]
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Веб-сервер (React-приложение + проксирование к API) ────────────────
  # Теперь это сборка из ./frontend: внутри Docker сначала собирается React
  # (Vite), затем готовая статика отдаётся Caddy. Тебе по-прежнему достаточно
  # одной команды `docker compose up --build` — никакой ручной сборки.
  web:
    build: ./frontend
    mem_limit: 256m
    ports:
      # Открой http://localhost:8080 в браузере, чтобы увидеть приложение.
      - "8080:80"
    depends_on:
      - backend
    healthcheck:
      # Caddy на alpine: busybox wget доступен. Проверяем, что страница отдаётся.
      test: ["CMD-SHELL", "wget -q --spider http://localhost:80/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── Туннель (постоянный публичный HTTPS-адрес для Telegram) ────────────
  # ngrok создаёт публичный адрес, который ведёт на наш веб-сервер (web).
  # Telegram умеет открывать только HTTPS, а наш компьютер из интернета не
  # виден — туннель решает обе проблемы.
  #
  # В отличие от прежнего cloudflared, адрес здесь ПОСТОЯННЫЙ
  # (https://pagan-crawling-retiring.ngrok-free.dev) — его достаточно один раз
  # прописать в @BotFather как URL Mini App, и он больше не меняется.
  #
  # Домен — не секрет, поэтому он вшит значением по умолчанию.
  # А вот ТОКЕН ngrok — это секрет, и теперь он берётся ТОЛЬКО из файла .env
  # (он не попадает в репозиторий). Если .env с токеном нет — запуск остановится
  # с понятной подсказкой. Как создать .env — см. файл .env.example.
  ngrok:
    image: ngrok/ngrok:latest
    mem_limit: 256m
    # --request-header-add добавляет к каждому запросу заголовок
    # ngrok-skip-browser-warning — официальный способ убрать страницу-предупреждение
    # ngrok («Visit Site») перед открытием приложения.
    command:
      - "http"
      - "--domain=${NGROK_DOMAIN:-pagan-crawling-retiring.ngrok-free.dev}"
      - "--request-header-add"
      - "ngrok-skip-browser-warning:true"
      - "web:80"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?Не задан NGROK_AUTHTOKEN. Создай файл .env рядом с docker-compose.yml и впиши строку NGROK_AUTHTOKEN=твой_токен (подробно в .env.example).}
    ports:
      # Локальная панель ngrok (список запросов, удобно при отладке загрузки
      # фото): открой http://localhost:4040 в браузере. Привязана ТОЛЬКО к
      # localhost (127.0.0.1), чтобы панель не была видна из локальной сети.
      - "127.0.0.1:4040:4040"
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
  photos_data:
  secrets_data:
