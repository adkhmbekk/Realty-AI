# docker-compose описывает все части системы и как их запускать вместе.
# Команда `docker compose up` поднимет всё, что здесь перечислено.

services:
  # ─── База данных PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: realty
      POSTGRES_PASSWORD: realty_local_dev
      POSTGRES_DB: realty
    ports:
      # Доступ к базе с компьютера (для pgAdmin4 / DBeaver): localhost:5432.
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty -d realty"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Backend (FastAPI) ──────────────────────────────────────────────────
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://realty:realty_local_dev@db:5432/realty
      BOT_TOKEN: ${BOT_TOKEN:-}
      SUPERADMIN_TELEGRAM_ID: ${SUPERADMIN_TELEGRAM_ID:-}
      JWT_SECRET: ${JWT_SECRET:-}
      BOT_USERNAME: ${BOT_USERNAME:-}
    volumes:
      # Загруженные фото объектов хранятся здесь и переживают перезапуски.
      - photos_data:/data/photos
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ─── Веб-сервер (React-приложение + проксирование к API) ────────────────
  web:
    build: ./frontend
    ports:
      # Открой http://localhost:8080 в браузере, чтобы увидеть приложение.
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Туннель ngrok (ПОСТОЯННЫЙ публичный HTTPS-адрес для Telegram) ───────
  # Адрес стабильный: https://pagan-crawling-retiring.ngrok-free.dev
  # Его достаточно ОДИН раз вставить в @BotFather (Mini App URL).
  # Токен и домен можно переопределить в .env (NGROK_AUTHTOKEN / NGROK_DOMAIN),
  # иначе используются значения по умолчанию ниже (репозиторий приватный).
  ngrok:
    image: ngrok/ngrok:latest
    command: http web:80 --domain=${NGROK_DOMAIN:-pagan-crawling-retiring.ngrok-free.dev}
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-3EWS0VQvnjdRR4g3PpcwQ6pub9B_4tZoRGho3RGK8KmgHbZ6n}
    depends_on:
      - web
    restart: unless-stopped

volumes:
  db_data:
  photos_data:
