<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Realty</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: #f4f5f7; --card: #ffffff; --text: #0f172a; --muted: #6b7280;
      --border: #eceff3; --soft: #f3f5f9;
      --input-bg: #ffffff; --input-border: #dfe3ea;
      --primary: #2563eb; --primary-text: #ffffff; --primary-soft: #e8eefe;
      --ghost-bg: #eef1fb; --ghost-text: #3538cd;
      --danger-bg: #fdebec; --danger-text: #c0271f;
      --row-line: #f1f3f7;
      --ring: rgba(37,99,235,.22); --shadow: 0 6px 24px rgba(15,23,42,.07);
      --info-bg:#eef4ff; --info-text:#1e40af; --ok-bg:#eafaf2; --ok-text:#0a7a48;
      --warn-bg:#fff7e8; --warn-text:#92600e; --err-bg:#fdecec; --err-text:#b42318;
      --badge-green-bg:#e3f8ec; --badge-green-tx:#0a7a48;
      --badge-gray-bg:#eef0f4; --badge-gray-tx:#475569;
      --badge-red-bg:#fdecec; --badge-red-tx:#b42318;
      --badge-amber-bg:#fff3da; --badge-amber-tx:#9a6207;
    }
    [data-theme="dark"] {
      --bg: #0e1116; --card: #161a21; --text: #e6e9ef; --muted: #9aa4b2;
      --border: #232936; --soft: #1b2230; --input-bg: #121722; --input-border: #2c3442;
      --primary: #3b82f6; --primary-text: #ffffff; --primary-soft: #1b2740;
      --ghost-bg: #1d2532; --ghost-text: #c7d2fe;
      --danger-bg: #3a1d1d; --danger-text: #fca5a5;
      --row-line: #222a36;
      --ring: rgba(59,130,246,.35); --shadow: 0 10px 30px rgba(0,0,0,.5);
      --info-bg:#10213d; --info-text:#bfdbfe; --ok-bg:#0d2a20; --ok-text:#86efac;
      --warn-bg:#33270a; --warn-text:#fcd667; --err-bg:#3a1d1d; --err-text:#fca5a5;
      --badge-green-bg:#0d2a20; --badge-green-tx:#6ee7b7;
      --badge-gray-bg:#222a36; --badge-gray-tx:#cbd5e1;
      --badge-red-bg:#3a1d1d; --badge-red-tx:#fca5a5;
      --badge-amber-bg:#33270a; --badge-amber-tx:#fcd667;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; min-height: 100vh; align-items: flex-start; justify-content: center; padding: 14px;
      transition: background .2s ease, color .2s ease; line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    .card { background: transparent; padding: 0; max-width: 540px; width: 100%; }
    .hdr { display:flex; align-items:center; gap:10px; min-height: 36px; margin-bottom: 12px; }
    .hdr .back {
      background: var(--card); color: var(--text); border:1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; font-size: 14px; font-weight: 600; cursor:pointer;
      box-shadow: var(--shadow); transition: transform .08s ease;
    }
    .hdr .back:active { transform: scale(.96); }
    .hdr .ttl { font-size: 19px; font-weight: 700; letter-spacing: -.01em; }
    h2 { font-size: 15px; font-weight: 700; margin: 18px 2px 8px; letter-spacing: -.01em; }
    .sub { color: var(--muted); font-size: 13px; margin: 0 0 10px; }
    .status { border-radius: 12px; padding: 11px 13px; font-size: 14px; line-height: 1.5; margin-bottom: 12px; }
    .status.info { background: var(--info-bg); color: var(--info-text); }
    .status.ok   { background: var(--ok-bg); color: var(--ok-text); }
    .status.warn { background: var(--warn-bg); color: var(--warn-text); }
    .status.err  { background: var(--err-bg); color: var(--err-text); }
    .status.hidden { display: none; }
    .row { display: flex; justify-content: space-between; gap: 10px; padding: 9px 0; font-size: 14px; border-top: 1px solid var(--row-line); }
    .row:first-child { border-top: 0; }
    .row span:first-child { color: var(--muted); }
    .row span:last-child { text-align: right; word-break: break-word; }
    label { display:block; font-size: 12.5px; font-weight: 600; color: var(--muted); margin: 12px 0 5px; }
    input, select {
      width: 100%; padding: 12px 13px; border: 1px solid var(--input-border);
      border-radius: 12px; font-size: 15px; background: var(--input-bg); color: var(--text);
      transition: border-color .15s ease, box-shadow .15s ease; appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--ring); }
    button {
      border: 0; border-radius: 12px; padding: 12px 15px; font-size: 15px; font-weight: 600;
      cursor: pointer; background: var(--primary); color: var(--primary-text);
      transition: transform .08s ease, filter .15s ease, opacity .15s ease;
    }
    button:active { transform: scale(.97); }
    button.full { width: 100%; margin-top: 14px; }
    button.ghost { background: var(--ghost-bg); color: var(--ghost-text); }
    button.danger { background: var(--danger-bg); color: var(--danger-text); }
    button.small { padding: 8px 12px; font-size: 13px; border-radius: 10px; }
    button:disabled { opacity: .5; cursor: default; transform: none; }
    .menu { display:flex; flex-direction:column; gap:10px; margin-top: 4px; }
    .menu-btn {
      display:flex; align-items:center; gap:13px; width:100%; text-align:left;
      background: var(--card); color: var(--text); border: 1px solid var(--border);
      border-radius: 16px; padding: 13px 14px; font-size: 16px; font-weight: 600;
      box-shadow: var(--shadow); transition: transform .08s ease, border-color .15s ease;
    }
    .menu-btn:active { transform: scale(.985); border-color: var(--primary); }
    .menu-btn .ic {
      font-size: 20px; width: 40px; height: 40px; flex: 0 0 auto; border-radius: 12px;
      background: var(--primary-soft); display:flex; align-items:center; justify-content:center;
    }
    .menu-btn .lbl { flex: 1; }
    .menu-btn .chev { color: var(--muted); font-size: 22px; font-weight: 400; opacity: .6; }
    .item {
      border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; margin-top: 10px;
      background: var(--card); box-shadow: var(--shadow);
    }
    .item.tap { cursor: pointer; transition: transform .08s ease, border-color .15s ease; }
    .item.tap:active { transform: scale(.99); border-color: var(--primary); }
    .item .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .item .title { font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
    .item .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .badge { font-size: 11.5px; padding: 4px 9px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
    .badge.green { background: var(--badge-green-bg); color: var(--badge-green-tx); }
    .badge.gray  { background: var(--badge-gray-bg); color: var(--badge-gray-tx); }
    .badge.red   { background: var(--badge-red-bg); color: var(--badge-red-tx); }
    .badge.amber { background: var(--badge-amber-bg); color: var(--badge-amber-tx); }
    .codebox { background:#0f172a; color:#e2e8f0; border-radius:12px; padding:11px 13px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; word-break: break-all; margin-top: 8px; }
    .muted { color: var(--muted); font-size: 12px; margin-top: 14px; word-break: break-all; }
    .empty { color: var(--muted); font-size: 14px; padding: 18px 0; text-align:center; }
    .hint { background: var(--soft); border:1px solid var(--border); border-radius:12px; padding:10px 13px; font-size:13px; color: var(--muted); margin-top:10px; line-height:1.5; }
    .seg { display:flex; gap:6px; background: var(--soft); border:1px solid var(--border); border-radius: 12px; padding: 4px; margin-top: 6px; }
    .seg button { flex:1; min-width: 80px; background: transparent; color: var(--muted); border:0; box-shadow:none; padding: 9px 10px; border-radius: 9px; font-size: 13px; }
    .seg button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }
    .hero {
      border-radius: 20px; padding: 20px 18px; margin: 2px 0 14px;
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 52%, #7c3aed 100%);
      color: #fff; display: flex; align-items: center; gap: 14px;
      box-shadow: 0 14px 34px rgba(79,70,229,.35); transition: transform .08s ease;
    }
    .hero:active { transform: scale(.99); }
    [data-theme="dark"] .hero { box-shadow: 0 14px 34px rgba(0,0,0,.5); }
    .hero .avatar {
      width: 56px; height: 56px; border-radius: 18px; flex: 0 0 auto;
      background: rgba(255,255,255,.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 21px; font-weight: 700; letter-spacing: .5px;
      border: 1px solid rgba(255,255,255,.35);
    }
    .hero .who { min-width: 0; }
    .hero .greet { font-size: 12px; opacity: .85; margin-bottom: 2px; }
    .hero .nm { font-size: 20px; font-weight: 700; line-height: 1.2; overflow-wrap: anywhere; letter-spacing: -.01em; }
    .hero .rl { font-size: 12.5px; opacity: .9; margin-top: 3px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .chip {
      background: var(--soft); color: var(--text); border: 1px solid var(--border);
      border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: transform .08s ease, background .12s ease, border-color .12s ease;
    }
    .chip:active { transform: scale(.95); }
    .chip.active { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
    .spinner {
      width: 22px; height: 22px; border-radius: 50%; margin: 18px auto;
      border: 2.5px solid var(--border); border-top-color: var(--primary); animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn .22s ease; }
    @media (prefers-reduced-motion: reduce) { .fade-in { animation: none; } button:active, .item.tap:active, .hero:active, .chip:active { transform: none; } }

    /* ─── Улучшения дизайна (v0.4) ─────────────────────────────────── */
    body { padding-bottom: 28px; }
    textarea {
      width: 100%; padding: 12px 13px; border: 1px solid var(--input-border);
      border-radius: 12px; font-size: 15px; background: var(--input-bg); color: var(--text);
      font-family: inherit; line-height: 1.45; resize: vertical; min-height: 44px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    textarea:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--ring); }
    /* Заголовок секции внутри формы — делит длинную форму на смысловые блоки. */
    .form-sec {
      font-size: 12px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      color: var(--primary); margin: 18px 2px 4px; padding-top: 12px; border-top: 1px solid var(--row-line);
      display: flex; align-items: center; gap: 8px;
    }
    .form-sec:first-child { border-top: 0; padding-top: 0; margin-top: 2px; }
    /* Миниатюра фото объекта. */
    .thumb { display:block; width:100%; border-radius: 14px; overflow:hidden; margin-bottom: 10px; background: var(--soft); }
    .thumb img { display:block; width:100%; max-height: 220px; object-fit: cover; }
    /* Внутренний комментарий — заметный, но визуально «секретный». */
    .note-internal {
      margin-top: 10px; border-radius: 14px; padding: 12px 14px; font-size: 14px; line-height: 1.5;
      background: var(--warn-bg); color: var(--warn-text); border: 1px dashed var(--warn-text);
      white-space: pre-wrap; word-break: break-word;
    }
    .note-internal-ttl { font-weight: 700; font-size: 12px; margin-bottom: 4px; opacity: .9; }
    /* Цветной акцент слева у карточки объекта по статусу. */
    .item.st-active   { border-left: 3px solid #16a34a; }
    .item.st-deposit  { border-left: 3px solid #d99100; }
    .item.st-sold     { border-left: 3px solid #64748b; }
    .item.st-archived { border-left: 3px solid #94a3b8; }
    .price-tag { font-weight: 800; color: var(--primary); }
    /* Бейдж с точкой-индикатором. */
    .badge { display: inline-flex; align-items: center; gap: 5px; }
    .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: .85; }
    /* Чуть выразительнее тапаемые карточки. */
    .item.tap { position: relative; }
    .item.tap:active { box-shadow: 0 2px 10px rgba(15,23,42,.10); }
    /* Главная кнопка — мягкое свечение. */
    button.full { box-shadow: 0 8px 20px rgba(37,99,235,.28); }
    button.full.danger { box-shadow: 0 8px 20px rgba(192,39,31,.18); }

    /* ════════════════════════════════════════════════════════════════
       РЕДИЗАЙН v0.5 «Aurora» — премиальный вид. Определён последним,
       поэтому переопределяет базовые стили (правила той же специфичности
       побеждают, если объявлены ниже).
       ════════════════════════════════════════════════════════════════ */
    :root {
      --bg: #f5f7fb; --card: #ffffff; --text: #0c1424; --muted: #5c6b85;
      --border: #e8edf5; --soft: #eef2f9;
      --input-bg: #ffffff; --input-border: #d9e0ee;
      --primary: #2563eb; --primary-2: #1d4ed8; --primary-text: #ffffff; --primary-soft: #e6efff;
      --ghost-bg: #eaf0ff; --ghost-text: #1d4ed8;
      --danger-bg: #fdeceb; --danger-text: #d4332a;
      --row-line: #eef2f8;
      --ring: rgba(37,99,235,.18); --shadow: 0 8px 30px rgba(13,30,66,.08);
      --shadow-lg: 0 18px 50px rgba(13,30,66,.14);
      --radius: 18px;
      --grad: linear-gradient(135deg, #2563eb 0%, #3b82f6 45%, #1d4ed8 100%);
    }
    [data-theme="dark"] {
      --bg: #060b16; --card: #101826; --text: #eaf0fb; --muted: #8b9bb5;
      --border: #1e2940; --soft: #152032; --input-bg: #0c1422; --input-border: #243149;
      --primary: #3b82f6; --primary-2: #2563eb; --primary-text: #ffffff; --primary-soft: #16243f;
      --ghost-bg: #16223a; --ghost-text: #bcd2ff;
      --danger-bg: #3a1d1d; --danger-text: #fca5a5;
      --row-line: #1c2740;
      --ring: rgba(59,130,246,.32); --shadow: 0 10px 34px rgba(0,0,0,.5);
      --shadow-lg: 0 22px 60px rgba(0,0,0,.62);
      --grad: linear-gradient(135deg, #1d4ed8 0%, #2563eb 45%, #3b82f6 100%);
    }

    /* Фон: мягкие синие свечения + еле заметная точечная сетка (деловой финтех). */
    body {
      background:
        radial-gradient(1100px 420px at 12% -12%, rgba(37,99,235,.16), transparent 60%),
        radial-gradient(900px 360px at 112% -4%, rgba(56,189,248,.12), transparent 55%),
        var(--bg);
      background-attachment: fixed;
      padding: 14px 14px calc(28px + env(safe-area-inset-bottom, 0px));
      letter-spacing: -0.005em;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none; opacity: .5;
      background-image: radial-gradient(currentColor 1px, transparent 1px);
      background-size: 22px 22px; color: rgba(37,99,235,.05);
    }
    [data-theme="dark"] body::before { color: rgba(120,160,255,.06); }
    .card { max-width: 560px; }

    /* Шапка. */
    .hdr .ttl { font-size: 20px; font-weight: 800; letter-spacing: -.02em; }
    .hdr .back {
      border-radius: 12px; padding: 9px 13px; font-weight: 700;
      border: 1px solid var(--border); background: var(--card); box-shadow: var(--shadow);
    }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 22px 4px 10px; }

    /* Hero-карточка профиля — балансовый финтех-блок. */
    .hero {
      position: relative; overflow: hidden;
      border-radius: 24px; padding: 22px 20px; margin: 4px 0 16px; gap: 16px;
      background:
        radial-gradient(140% 130% at 0% 0%, #3b82f6 0%, #2563eb 42%, #1d4ed8 100%);
      box-shadow: 0 20px 46px rgba(29,78,216,.40);
    }
    .hero::after {
      content: ""; position: absolute; right: -50px; top: -70px; width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(255,255,255,.20), transparent 65%); pointer-events: none;
    }
    .hero::before {
      content: ""; position: absolute; left: -30px; bottom: -80px; width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(125,211,252,.22), transparent 66%); pointer-events: none;
    }
    [data-theme="dark"] .hero { box-shadow: 0 20px 50px rgba(0,0,0,.55); }
    .hero .avatar {
      width: 58px; height: 58px; border-radius: 18px; font-size: 22px;
      background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.4);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.3); backdrop-filter: blur(4px);
    }
    .hero .avatar svg { width: 28px; height: 28px; }
    .hero .greet { font-size: 12px; opacity: .9; }
    .hero .nm { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
    .hero .rl { font-size: 12.5px; opacity: .92; margin-top: 4px; }

    /* Меню — кнопки с иконками в фирменной плитке (минимализм, один тон). */
    .menu { gap: 11px; }
    .menu-btn {
      border-radius: 18px; padding: 14px 15px; font-size: 16px; font-weight: 700;
      border: 1px solid var(--border); box-shadow: var(--shadow);
    }
    .menu-btn:hover { border-color: color-mix(in srgb, var(--primary) 35%, var(--border)); }
    .menu-btn:active { transform: scale(.985); }
    .menu-btn .ic {
      width: 44px; height: 44px; border-radius: 14px; color: #fff;
      background: var(--grad); box-shadow: 0 6px 16px rgba(37,99,235,.28);
    }
    .menu-btn .ic svg { width: 22px; height: 22px; }
    .menu-btn .chev { font-size: 24px; }

    /* Карточки. */
    .item { border-radius: var(--radius); padding: 15px 16px; box-shadow: var(--shadow); }
    .item.tap { transition: transform .12s ease, box-shadow .15s ease, border-color .15s ease; }
    .item.tap:hover { box-shadow: var(--shadow-lg); transform: translateY(-1px); }
    .item .title { font-size: 16px; font-weight: 800; letter-spacing: -.01em; }
    .item .meta { font-size: 13px; }

    /* Статистика-дашборд (кликабельные плитки). */
    .stats-wrap { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 2px 0 14px; }
    .stat-tile {
      display: flex; flex-direction: column; align-items: flex-start; gap: 2px;
      padding: 15px 14px; border-radius: 18px; border: 1px solid var(--border);
      background: var(--card); box-shadow: var(--shadow); cursor: pointer; text-align: left;
      position: relative; overflow: hidden; transition: transform .12s ease, box-shadow .15s ease;
    }
    .stat-tile::before {
      content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 4px;
    }
    .stat-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .stat-tile:active { transform: scale(.97); }
    .stat-num { font-size: 26px; font-weight: 800; line-height: 1.1; letter-spacing: -.02em; color: var(--text); }
    .stat-lbl { font-size: 12px; font-weight: 600; color: var(--muted); }
    .stat-active::before  { background: linear-gradient(180deg,#16a34a,#34d399); }
    .stat-deposit::before { background: linear-gradient(180deg,#f59e0b,#fbbf24); }
    .stat-sold::before    { background: linear-gradient(180deg,#64748b,#94a3b8); }
    .stat-active .stat-num  { color: #16a34a; }
    .stat-deposit .stat-num { color: #d99100; }
    [data-theme="dark"] .stat-active .stat-num { color: #4ade80; }
    [data-theme="dark"] .stat-deposit .stat-num { color: #fbbf24; }

    /* Поля ввода. */
    input, select, textarea {
      border-radius: 14px; padding: 13px 14px; font-size: 15px;
      border: 1px solid var(--input-border); background: var(--input-bg);
    }
    input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--ring); }
    label { font-size: 12px; font-weight: 700; letter-spacing: .01em; margin: 14px 0 6px; }

    /* Кнопки. */
    button {
      border-radius: 14px; font-weight: 700;
      background: var(--grad);
      color: var(--primary-text);
    }
    button.full { padding: 14px 16px; box-shadow: 0 12px 26px rgba(37,99,235,.32); }
    button.ghost { background: var(--ghost-bg); color: var(--ghost-text); }
    button.danger { background: var(--danger-bg); color: var(--danger-text); }
    button.full.danger { background: linear-gradient(135deg,#ef4444,#f87171); color:#fff; box-shadow: 0 12px 26px rgba(239,68,68,.32); }
    button.small { border-radius: 11px; padding: 9px 13px; font-size: 13px; }

    /* Сегмент-переключатель. */
    .seg { border-radius: 14px; padding: 5px; gap: 4px; background: var(--soft); }
    .seg button { border-radius: 10px; font-weight: 700; background: transparent; color: var(--muted); }
    .seg button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }

    /* Чипы. */
    .chip { border-radius: 999px; padding: 9px 15px; font-weight: 700; border: 1px solid var(--border); background: var(--card); }
    .chip.active { background: var(--grad); color: #fff; border-color: transparent; box-shadow: 0 6px 16px rgba(37,99,235,.3); }

    /* Бейджи (с точкой). */
    .badge { padding: 5px 10px; border-radius: 999px; font-size: 11px; font-weight: 800; letter-spacing: .02em; }

    /* Прочее. */
    .hint { border-radius: 14px; padding: 11px 14px; }
    .codebox { border-radius: 14px; }
    .status { border-radius: 14px; padding: 12px 14px; font-weight: 600; }
    .form-sec { color: var(--primary); }
    .empty { padding: 26px 0; }
    .spinner { border-top-color: var(--primary); }

    /* ─── Новые компоненты редизайна «Realty AI» ──────────────────── */
    /* Бренд над hero. */
    .brand { display:flex; align-items:center; gap:9px; margin: 2px 2px 12px; }
    .brand .logo {
      width: 30px; height: 30px; border-radius: 9px; display:flex; align-items:center; justify-content:center;
      background: var(--grad); color:#fff; box-shadow: 0 6px 16px rgba(37,99,235,.32);
    }
    .brand .logo svg { width: 18px; height: 18px; }
    .brand .bname { font-size: 17px; font-weight: 800; letter-spacing: -.02em; }
    .brand .bname b { color: var(--primary); }
    /* Быстрые действия (ряд иконок-кнопок, финтех-паттерн). */
    .qa { display:grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 2px 0 16px; }
    .qa-btn {
      display:flex; flex-direction:column; align-items:center; gap:8px; cursor:pointer;
      background: var(--card); border:1px solid var(--border); border-radius:16px; padding:13px 6px;
      box-shadow: var(--shadow); transition: transform .12s ease, box-shadow .15s ease;
      color: var(--text);
    }
    .qa-btn:active { transform: scale(.95); }
    .qa-btn:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }
    .qa-ic { width:42px; height:42px; border-radius:13px; display:flex; align-items:center; justify-content:center;
      background: var(--primary-soft); color: var(--primary); }
    .qa-ic svg { width:21px; height:21px; }
    .qa-lbl { font-size: 11.5px; font-weight: 700; color: var(--muted); text-align:center; line-height:1.15; }
    /* Мини-график под счётчиком статуса. */
    .stat-track { width:100%; height:5px; border-radius:999px; background: var(--soft); margin-top:8px; overflow:hidden; }
    .stat-fill { height:100%; border-radius:999px; }
    .stat-active .stat-fill { background: linear-gradient(90deg,#16a34a,#34d399); }
    .stat-deposit .stat-fill { background: linear-gradient(90deg,#f59e0b,#fbbf24); }
    .stat-sold .stat-fill { background: linear-gradient(90deg,#64748b,#94a3b8); }
    /* Иконка-лидер в карточке объекта. */
    .item .lead { display:flex; align-items:center; gap:12px; }
    .lead-ic { width:44px; height:44px; flex:0 0 auto; border-radius:13px; display:flex; align-items:center; justify-content:center;
      background: var(--primary-soft); color: var(--primary); }
    .lead-ic svg { width:22px; height:22px; }
    .lead-main { min-width:0; flex:1; }
    /* Заголовок секции статистики. */
    .section-row { display:flex; align-items:center; justify-content:space-between; margin: 4px 2px 10px; }
    .section-row .ttl2 { font-size: 14px; font-weight: 800; letter-spacing: -.01em; }
    .section-row .lnk { font-size: 13px; font-weight: 700; color: var(--primary); cursor:pointer; }
  </style>
</head>

    function applyTheme() {

      theme = theme === "dark" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", theme);
      // Подкрашиваем фон/шапку самого Telegram под нашу тему (если поддерживается).
      const bg = theme === "dark" ? "#0e1116" : "#f4f5f7";
      try { if (tg && tg.setBackgroundColor) tg.setBackgroundColor(bg); } catch (e) {}
      try { if (tg && tg.setHeaderColor) tg.setHeaderColor(bg); } catch (e) {}

      statusEl.textContent = text;

    function fmtDate(iso) {
      if (!iso) return t("notSet");
      try {
        const d = new Date(iso);
        const tz = state.timezone || null;
        const dOpts = tz ? { timeZone: tz } : {};
        const tOpts = tz ? { hour:"2-digit", minute:"2-digit", timeZone: tz } : { hour:"2-digit", minute:"2-digit" };
        const loc = state.lang === "en" ? "en-GB" : (state.lang === "uz" ? "uz-UZ" : "ru-RU");
        return d.toLocaleDateString(loc, dOpts) + " " + d.toLocaleTimeString(loc, tOpts);

    async function api(path, opts) {
      opts = opts || {};
      const headers = { "Content-Type": "application/json" };
      if (state.token) headers["Authorization"] = "Bearer " + state.token;
      const res = await fetch(path, {
        method: opts.method || "GET",
        headers,
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      let data = null;
      try { data = await res.json(); } catch (e) { data = null; }
      return { ok: res.ok, status: res.status, data };
    }

    // Каждый экран — { titleKey, render }. Стек хранит экраны для кнопки «Назад».
    const nav = { stack: [] };
    function renderCurrent() {
      const screen = nav.stack[nav.stack.length - 1];
      if (!screen) return;
      const title = screen.titleKey ? t(screen.titleKey) : "";
      titleEl.textContent = title;
      const hasBack = nav.stack.length > 1;
      backBtn.style.display = hasBack ? "" : "none";
      backBtn.textContent = "← " + t("back");
      // Пустую шапку (нет ни кнопки «Назад», ни заголовка) скрываем,
      // чтобы над герой-карточкой не было пустой полосы.
      if (hdrEl) hdrEl.style.display = (hasBack || title) ? "flex" : "none";
      if (tg && tg.BackButton) { try { hasBack ? tg.BackButton.show() : tg.BackButton.hide(); } catch (e) {} }
      setStatus("", null);
      contentEl.innerHTML = "";
      contentEl.classList.remove("fade-in");
      void contentEl.offsetWidth;
      contentEl.classList.add("fade-in");
      screen.render(contentEl);
    }
    function navigate(screen) { haptic("light"); nav.stack.push(screen); renderCurrent(); }
    function back() { if (nav.stack.length > 1) { haptic("light"); nav.stack.pop(); renderCurrent(); } }
    function resetTo(screen) { nav.stack = [screen]; renderCurrent(); }

    if (tg && tg.BackButton && tg.BackButton.onClick) { try { tg.BackButton.onClick(back); } catch (e) {} }

    function collectObjBody(host, full) {
      const body = {};
      const fields = {
        name: vStr(host, "#n-name"), type: vStr(host, "#n-type"), district: vStr(host, "#n-district"),
        address: vStr(host, "#n-address"), rooms: vNum(host, "#n-rooms", false), floor: vNum(host, "#n-floor", false),
        total_floors: vNum(host, "#n-tfloors", false), area: vNum(host, "#n-area", true), price: vNum(host, "#n-price", true),

        description: vStr(host, "#n-desc"), comment: vStr(host, "#n-comment"),
      };
      Object.keys(fields).forEach(k => {

        if (full || fields[k] !== null) body[k] = fields[k];

      return body;

    // Вместо номера собственника — контактный номер агентства (state.contactPhone).
    function buildShareCard(o) {
      const lines = [];
      lines.push("🏠 " + t("apartment") + " №" + (o.display_id || ""));
      if (o.name) lines.push("📋 " + o.name);
      if (o.type) lines.push("🏗 " + t("f_type") + ": " + typeLabel(o.type));
      if (o.district) lines.push("📍 " + t("f_district") + ": " + o.district);
      if (o.address) lines.push("🗺 " + t("f_address") + ": " + o.address);
      if (o.rooms != null) lines.push("🚪 " + t("f_rooms") + ": " + o.rooms);
      const fl = (o.floor != null && o.total_floors != null) ? (o.floor + "/" + o.total_floors) : (o.floor != null ? String(o.floor) : null);
      if (fl) lines.push("🏢 " + t("f_floor") + ": " + fl);
      if (o.area != null) lines.push("📐 " + o.area + " m²");
      if (o.condition) lines.push("🔧 " + condLabel(o.condition));
      if (o.furniture_appliances) lines.push("🛋 " + faLabel(o.furniture_appliances));
      if (o.price != null) lines.push("💵 " + o.price + " " + (o.currency || ""));
      if (o.source_link) lines.push("🔗 " + o.source_link);
      if (o.description) lines.push("📝 " + o.description);
      if (state.contactPhone) lines.push("📞 " + state.contactPhone);
      return lines.join("\n");
    }
    function shareToTelegram(text) {

    function initials(name) {
      const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "👤";
      const a = parts[0][0] || "";
      const b = parts.length > 1 ? (parts[parts.length - 1][0] || "") : "";
      return (a + b).toUpperCase();

    async function appendStats(host) {
      const wrap = el(`<div id="stats-box"></div>`);
      host.appendChild(wrap);
      const r = await api("/api/v1/apartments/stats");
      if (!r.ok || !r.data) { wrap.remove(); return; }
      const s = r.data;
      const tiles = [
        ["active", "statusActive", s.active || 0, "stat-active"],
        ["deposit", "statusDeposit", s.deposit || 0, "stat-deposit"],
        ["sold", "statusSold", s.sold || 0, "stat-sold"],
      ];
      const max = Math.max(1, s.active || 0, s.deposit || 0, s.sold || 0);
      wrap.innerHTML = `<div class="section-row"><span class="ttl2">${esc(t("stats"))}</span><span class="lnk" id="stats-all">${esc(t("myDatabase"))} ›</span></div>`;
      const grid = el(`<div class="stats-wrap"></div>`);
      tiles.forEach(([status, labelKey, count, cls]) => {
        const pct = Math.round((count / max) * 100);
        const tile = el(`<button class="stat-tile ${cls}">
          <div class="stat-num">${count}</div>
          <div class="stat-lbl">${esc(t(labelKey))}</div>
          <div class="stat-track"><div class="stat-fill" style="width:${pct}%"></div></div>
        </button>`);
        // Нажатие на плитку открывает список объектов только с этим статусом.
        tile.addEventListener("click", () => navigate(objectListScreen({ status }, labelKey)));
        grid.appendChild(tile);
      });
      wrap.appendChild(grid);
      const allLnk = wrap.querySelector("#stats-all");
      if (allLnk) allLnk.addEventListener("click", () => navigate(databaseScreen()));
    }

    function agencyEffectiveStatus(a) {
      if (a.status === "frozen") return "frozen";
      if (a.subscription_expires_at && new Date(a.subscription_expires_at) < new Date()) return "expired";
      return a.status;
    }
    function agencyStatusBadge(a) {
      const eff = agencyEffectiveStatus(a);
      const map = { active: ["green","st_active"], trial: ["green","st_trial"], frozen: ["amber","st_frozen"], expired: ["red","st_expired"] };
      const m = map[eff] || ["gray", null];
      return `<span class="badge ${m[0]}">${esc(m[1] ? t(m[1]) : eff)}</span>`;
    }
    async function loadAgenciesInto(box) {

      if (!r.data.length) { box.innerHTML = `<div class="empty">${esc(t("noAgencies"))}</div>`; return; }
      box.innerHTML = "";
      r.data.forEach(a => {

          <div class="meta">${esc(t("admin"))}: ${adminTxt}</div>

    async function renderAgencyManage(box, agencyId) {
      const r = await api("/api/v1/agencies");
      if (!r.ok) { box.innerHTML = `<div class="empty">${esc(t("error"))} (${r.status}).</div>`; return; }
      const a = (r.data || []).find(x => x.id === agencyId);
      if (!a) { box.innerHTML = `<div class="empty">${esc(t("notFound"))}</div>`; return; }
      const frozen = a.status === "frozen";
      const adminTxt = a.admin_name ? (esc(a.admin_name) + (a.admin_telegram_id ? " (ID " + a.admin_telegram_id + ")" : "")) : t("notAssigned");
      box.innerHTML = "";
      box.appendChild(el(`<div class="item">
        <div class="top"><span class="title">${esc(a.name)}</span>${agencyStatusBadge(a)}</div>
        ${a.project_name ? `<div class="meta">${esc(t("projectName"))}: ${esc(a.project_name)}</div>` : ""}
        <div class="meta">ID ${a.id}</div>
        <div class="meta">${esc(t("activatedAt"))}: ${fmtDate(a.activated_at || a.created_at)}</div>
        <div class="meta">${esc(t("subUntil"))}: ${fmtDate(a.subscription_expires_at)}</div>
        <div class="meta">${esc(t("admin"))}: ${adminTxt}</div>
      </div>`));

      // Все действия — кнопками. Продление и смена даты открывают окошко ввода.
      const actions = el(`<div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap"></div>`);

      const extBtn = el(`<button class="small ghost">${esc(t("extendBtn"))}</button>`);
      extBtn.addEventListener("click", async () => {
        const v = window.prompt(t("extendPrompt"), "30");
        if (v === null) return;
        const days = parseInt((v || "").trim(), 10);
        if (isNaN(days) || days <= 0) { setStatus(t("badDate"), "warn"); return; }
        await agencySub(agencyId, "extend", days); renderCurrent();
      });

      const dateBtn = el(`<button class="small ghost">${esc(t("changeDateBtn"))}</button>`);
      dateBtn.addEventListener("click", async () => {
        const v = window.prompt(t("setDatePrompt"), "");
        if (v === null) return;
        const s = (v || "").trim();
        if (!/^\d{4}-\d{2}-\d{2}$/.test(s)) { setStatus(t("badDate"), "warn"); return; }
        await agencySub(agencyId, "set", null, s + "T23:59:59Z"); renderCurrent();
      });

      const freezeBtn = el(`<button class="small ${frozen ? "ghost" : "danger"}">${esc(frozen ? t("activate") : t("freeze"))}</button>`);
      freezeBtn.addEventListener("click", async () => { await agencySub(agencyId, frozen ? "activate" : "freeze", null); renderCurrent(); });
      const renameBtn = el(`<button class="small ghost">${esc(t("rename"))}</button>`);
      renameBtn.addEventListener("click", () => doRenameAgency(agencyId, a.name));
      const adminBtn = el(`<button class="small ghost">${esc(t("changeAdmin"))}</button>`);
      adminBtn.addEventListener("click", () => doChangeAdmin(agencyId));
      const delBtn = el(`<button class="small danger">${esc(t("deleteAgency"))}</button>`);
      delBtn.addEventListener("click", () => doDeleteAgency(agencyId, a.name));

      [extBtn, dateBtn, freezeBtn, renameBtn, adminBtn, delBtn].forEach(b => actions.appendChild(b));
      box.appendChild(actions);
    }
    async function agencySub(id, action, days, expiresAt) {

      const r = await api("/api/v1/agencies/" + id + "/subscription", { method: "POST", body });

    function renderObjectListInto(host, params) {
      const page = { offset: 0, total: 0 };
      const countEl = el(`<div class="meta" style="margin:6px 0"></div>`);
      const cards = el(`<div></div>`);
      const moreWrap = el(`<div></div>`);
      host.appendChild(countEl); host.appendChild(cards); host.appendChild(moreWrap);
      async function loadPage(append) {
        moreWrap.innerHTML = `<div class="empty">${esc(t("loading"))}</div>`;
        const p = new URLSearchParams();
        Object.keys(params).forEach(k => {
          const v = params[k];
          if (v == null || v === "") return;
          if (Array.isArray(v)) v.forEach(x => { if (x != null && x !== "") p.append(k, x); });
          else p.set(k, v);
        });
        if (!p.has("status")) p.set("status", "all");
        p.set("limit", "20"); p.set("offset", String(page.offset));
        const r = await api("/api/v1/apartments?" + p.toString());
        if (!r.ok) { moreWrap.innerHTML = `<div class="empty">${esc(t("error"))} (${r.status}).</div>`; return; }
        const items = (r.data && r.data.items) || [];
        page.total = r.data.total || 0; page.offset += items.length;
        if (!append && !items.length) { countEl.textContent = ""; cards.innerHTML = `<div class="empty">${esc(t("notFound"))}</div>`; moreWrap.innerHTML = ""; return; }
        countEl.textContent = t("found") + ": " + page.total;
        items.forEach(o => cards.appendChild(objCard(o)));
        const left = page.total - page.offset;
        if (left > 0) { const mb = el(`<button class="ghost full">${esc(t("showMore"))} (${left})</button>`); mb.addEventListener("click", () => loadPage(true)); moreWrap.innerHTML = ""; moreWrap.appendChild(mb); }
        else moreWrap.innerHTML = "";
      }
      loadPage(false);
    }

        host.appendChild(el(`<div class="status info">${esc(t("notInAgency"))}</div>`));
        host.appendChild(el(`<label>${esc(t("joinCodeLabel"))}</label>`));
        const input = el(`<input value="${esc(prefill || "")}" />`); host.appendChild(input);
        const btn = el(`<button class="full">${esc(t("joinBtn"))}</button>`); host.appendChild(btn);
        async function doJoin() {
          const code = (input.value || "").trim();
          if (!code) return;
          btn.disabled = true; setStatus(t("joinChecking"), "info");
          const r = await redeem(state.initData, code);
          if (r.ok) { state.token = r.data.access_token; state.user = r.data.user; state.subscriptionActive = r.data.subscription_active; afterLogin(); }
          else { btn.disabled = false; setStatus(t("loginFail") + errText(r.data, r.status), "err"); }
        }
        btn.addEventListener("click", doJoin);
        if (prefill) doJoin();
      }};
    }

    // ════════════════════════ Старт ════════════════════════
    async function afterLogin() {
      setStatus("", null);
      const role = state.user && state.user.role;
      if (role === "agency_admin" || role === "agent") {
        // Подтягиваем настройки агентства до показа главного экрана, чтобы
        // герой-карточка сразу показала название проекта и валюту по умолчанию.
        await loadAgencySettings(true);
      }
      if ((role === "agency_admin" || role === "agent") && state.subscriptionActive === false) { resetTo(suspendedScreen()); return; }
      resetTo(homeScreen());
    }

    async function main() {
      applyTheme();
      document.documentElement.setAttribute("lang", state.lang === "uz" ? "uz" : (state.lang === "en" ? "en" : "ru"));
      if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }
      state.initData = (tg && tg.initData) ? tg.initData : "";
      state.startParam = (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || "";

      if (!state.initData) {
        let backendOk = false;
        try { const res = await fetch("/health"); const d = await res.json(); backendOk = d.database === "connected"; } catch (e) {}
        resetTo({ titleKey: null, render(host) {
          host.appendChild(el(`<div class="status ${backendOk ? "ok" : "warn"}">${esc(backendOk ? t("backendOk") : t("backendErr"))}</div>`));
          host.appendChild(el(`<div class="hint">${esc(t("openInTg"))}</div>`));
        }});
        return;
      }

      setStatus(t("loginIn"), "info");
      try {
        const r = await login(state.initData);
        if (r.ok) { state.token = r.data.access_token; state.user = r.data.user; state.subscriptionActive = r.data.subscription_active; afterLogin(); return; }
        if (r.status === 403) { resetTo(joinScreen(state.startParam)); return; }
        setStatus(t("loginFail") + errText(r.data, r.status), "err");
      } catch (e) { setStatus(t("loginFail") + e.message, "err"); }
    }
    main();

  </script>
</body>
</html>
