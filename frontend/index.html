    :root {
      --bg: #f4f5f7; --card: #ffffff; --text: #0f172a; --muted: #6b7280;

      --input-bg: #ffffff; --input-border: #dfe3ea;
      --primary: #2563eb; --primary-text: #ffffff; --primary-soft: #e8eefe;
      --ghost-bg: #eef1fb; --ghost-text: #3538cd;
      --danger-bg: #fdebec; --danger-text: #c0271f;
      --row-line: #f1f3f7;
      --ring: rgba(37,99,235,.22); --shadow: 0 6px 24px rgba(15,23,42,.07);
      --info-bg:#eef4ff; --info-text:#1e40af; --ok-bg:#eafaf2; --ok-text:#0a7a48;
      --warn-bg:#fff7e8; --warn-text:#92600e; --err-bg:#fdecec; --err-text:#b42318;

      --badge-gray-bg:#eef0f4; --badge-gray-tx:#475569;
      --badge-red-bg:#fdecec; --badge-red-tx:#b42318;
      --badge-amber-bg:#fff3da; --badge-amber-tx:#9a6207;
    }
    [data-theme="dark"] {
      --bg: #0e1116; --card: #161a21; --text: #e6e9ef; --muted: #9aa4b2;
      --border: #232936; --soft: #1b2230; --input-bg: #121722; --input-border: #2c3442;
      --primary: #3b82f6; --primary-text: #ffffff; --primary-soft: #1b2740;
      --ghost-bg: #1d2532; --ghost-text: #c7d2fe;
      --danger-bg: #3a1d1d; --danger-text: #fca5a5;
      --row-line: #222a36;
      --ring: rgba(59,130,246,.35); --shadow: 0 10px 30px rgba(0,0,0,.5);
      --info-bg:#10213d; --info-text:#bfdbfe; --ok-bg:#0d2a20; --ok-text:#86efac;
      --warn-bg:#33270a; --warn-text:#fcd667; --err-bg:#3a1d1d; --err-text:#fca5a5;
      --badge-green-bg:#0d2a20; --badge-green-tx:#6ee7b7;
      --badge-gray-bg:#222a36; --badge-gray-tx:#cbd5e1;
      --badge-red-bg:#3a1d1d; --badge-red-tx:#fca5a5;
      --badge-amber-bg:#33270a; --badge-amber-tx:#fcd667;

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; font-family: -apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; min-height: 100vh; align-items: flex-start; justify-content: center; padding: 14px;
      transition: background .2s ease, color .2s ease; line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }
    .card { background: transparent; padding: 0; max-width: 540px; width: 100%; }
    .hdr { display:flex; align-items:center; gap:10px; min-height: 36px; margin-bottom: 12px; }
    .hdr .back {
      background: var(--card); color: var(--text); border:1px solid var(--border);
      border-radius: 10px; padding: 8px 12px; font-size: 14px; font-weight: 600; cursor:pointer;
      box-shadow: var(--shadow); transition: transform .08s ease;
    }
    .hdr .back:active { transform: scale(.96); }
    .hdr .ttl { font-size: 19px; font-weight: 700; letter-spacing: -.01em; }
    h2 { font-size: 15px; font-weight: 700; margin: 18px 2px 8px; letter-spacing: -.01em; }
    .sub { color: var(--muted); font-size: 13px; margin: 0 0 10px; }
    .status { border-radius: 12px; padding: 11px 13px; font-size: 14px; line-height: 1.5; margin-bottom: 12px; }
    .status.info { background: var(--info-bg); color: var(--info-text); }
    .status.ok   { background: var(--ok-bg); color: var(--ok-text); }
    .status.warn { background: var(--warn-bg); color: var(--warn-text); }
    .status.err  { background: var(--err-bg); color: var(--err-text); }
    .status.hidden { display: none; }
    .row { display: flex; justify-content: space-between; gap: 10px; padding: 9px 0; font-size: 14px; border-top: 1px solid var(--row-line); }
    .row:first-child { border-top: 0; }
    .row span:first-child { color: var(--muted); }
    .row span:last-child { text-align: right; word-break: break-word; }
    label { display:block; font-size: 12.5px; font-weight: 600; color: var(--muted); margin: 12px 0 5px; }
    input, select {
      width: 100%; padding: 12px 13px; border: 1px solid var(--input-border);
      border-radius: 12px; font-size: 15px; background: var(--input-bg); color: var(--text);
      transition: border-color .15s ease, box-shadow .15s ease; appearance: none; -webkit-appearance: none;
    }
    input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px var(--ring); }
    button {
      border: 0; border-radius: 12px; padding: 12px 15px; font-size: 15px; font-weight: 600;
      cursor: pointer; background: var(--primary); color: var(--primary-text);
      transition: transform .08s ease, filter .15s ease, opacity .15s ease;
    }
    button:active { transform: scale(.97); }
    button.full { width: 100%; margin-top: 14px; }
    button.ghost { background: var(--ghost-bg); color: var(--ghost-text); }
    button.danger { background: var(--danger-bg); color: var(--danger-text); }
    button.small { padding: 8px 12px; font-size: 13px; border-radius: 10px; }
    button:disabled { opacity: .5; cursor: default; transform: none; }
    .menu { display:flex; flex-direction:column; gap:10px; margin-top: 4px; }
    .menu-btn {
      display:flex; align-items:center; gap:13px; width:100%; text-align:left;
      background: var(--card); color: var(--text); border: 1px solid var(--border);
      border-radius: 16px; padding: 13px 14px; font-size: 16px; font-weight: 600;
      box-shadow: var(--shadow); transition: transform .08s ease, border-color .15s ease;
    }
    .menu-btn:active { transform: scale(.985); border-color: var(--primary); }
    .menu-btn .ic {
      font-size: 20px; width: 40px; height: 40px; flex: 0 0 auto; border-radius: 12px;
      background: var(--primary-soft); display:flex; align-items:center; justify-content:center;
    }
    .menu-btn .lbl { flex: 1; }
    .menu-btn .chev { color: var(--muted); font-size: 22px; font-weight: 400; opacity: .6; }
    .item {
      border: 1px solid var(--border); border-radius: 14px; padding: 13px 14px; margin-top: 10px;
      background: var(--card); box-shadow: var(--shadow);
    }
    .item.tap { cursor: pointer; transition: transform .08s ease, border-color .15s ease; }
    .item.tap:active { transform: scale(.99); border-color: var(--primary); }
    .item .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .item .title { font-weight: 700; font-size: 15px; letter-spacing: -.01em; }
    .item .meta { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .badge { font-size: 11.5px; padding: 4px 9px; border-radius: 999px; font-weight: 700; white-space: nowrap; }
    .badge.green { background: var(--badge-green-bg); color: var(--badge-green-tx); }
    .badge.gray  { background: var(--badge-gray-bg); color: var(--badge-gray-tx); }
    .badge.red   { background: var(--badge-red-bg); color: var(--badge-red-tx); }
    .badge.amber { background: var(--badge-amber-bg); color: var(--badge-amber-tx); }
    .codebox { background:#0f172a; color:#e2e8f0; border-radius:12px; padding:11px 13px; font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px; word-break: break-all; margin-top: 8px; }
    .muted { color: var(--muted); font-size: 12px; margin-top: 14px; word-break: break-all; }
    .empty { color: var(--muted); font-size: 14px; padding: 18px 0; text-align:center; }
    .hint { background: var(--soft); border:1px solid var(--border); border-radius:12px; padding:10px 13px; font-size:13px; color: var(--muted); margin-top:10px; line-height:1.5; }
    .seg { display:flex; gap:6px; background: var(--soft); border:1px solid var(--border); border-radius: 12px; padding: 4px; margin-top: 6px; }
    .seg button { flex:1; min-width: 80px; background: transparent; color: var(--muted); border:0; box-shadow:none; padding: 9px 10px; border-radius: 9px; font-size: 13px; }
    .seg button.active { background: var(--card); color: var(--text); box-shadow: var(--shadow); }

      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 52%, #7c3aed 100%);
      color: #fff; display: flex; align-items: center; gap: 14px;
      box-shadow: 0 14px 34px rgba(79,70,229,.35); transition: transform .08s ease;

    .hero:active { transform: scale(.99); }
    [data-theme="dark"] .hero { box-shadow: 0 14px 34px rgba(0,0,0,.5); }
    .hero .avatar {
      width: 56px; height: 56px; border-radius: 18px; flex: 0 0 auto;
      background: rgba(255,255,255,.18);
      display: flex; align-items: center; justify-content: center;
      font-size: 21px; font-weight: 700; letter-spacing: .5px;

    .hero .greet { font-size: 12px; opacity: .85; margin-bottom: 2px; }
    .hero .nm { font-size: 20px; font-weight: 700; line-height: 1.2; overflow-wrap: anywhere; letter-spacing: -.01em; }
    .hero .rl { font-size: 12.5px; opacity: .9; margin-top: 3px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
    .chip {
      background: var(--soft); color: var(--text); border: 1px solid var(--border);

    .chip:active { transform: scale(.95); }
    .chip.active { background: var(--primary); color: var(--primary-text); border-color: var(--primary); }
    .spinner {
      width: 22px; height: 22px; border-radius: 50%; margin: 18px auto;
      border: 2.5px solid var(--border); border-top-color: var(--primary); animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .fade-in { animation: fadeIn .22s ease; }
    @media (prefers-reduced-motion: reduce) { .fade-in { animation: none; } button:active, .item.tap:active, .hero:active, .chip:active { transform: none; } }

    // Фиксированные значения данных (хранятся в БД как есть) + переводимые подписи.
    const OBJ_TYPE_VALUES = ["Квартира", "Дом", "Коммерция", "Земля"];

    function statusLabel(s) {
      const map = { active: t("statusActive"), deposit: t("statusDeposit"), sold: t("statusSold"), archived: t("statusArchived") };
      return map[s] || s;
    }
    function typeLabel(v) {
      const i = OBJ_TYPE_VALUES.indexOf(v);
      return i >= 0 ? (OBJ_TYPE_LABELS[state.lang] || OBJ_TYPE_LABELS.ru)[i] : v;
    }
    function condLabel(v) {
      const i = OBJ_COND_VALUES.indexOf(v);
      return i >= 0 ? (OBJ_COND_LABELS[state.lang] || OBJ_COND_LABELS.ru)[i] : v;
    }
    function roleLabel(role) {
      const k = "role_" + role;
      return (I18N[state.lang] && I18N[state.lang][k]) ? I18N[state.lang][k] : (role || t("notSet"));
    }
    // ════════════════════════ Тема и язык ════════════════════════
    function applyTheme() {
      let theme = state.theme;
      if (!theme) theme = (tg && tg.colorScheme === "dark") ? "dark" : "light";
      theme = theme === "dark" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", theme);
      // Подкрашиваем фон/шапку самого Telegram под нашу тему (если поддерживается).
      const bg = theme === "dark" ? "#0e1116" : "#f4f5f7";
      try { if (tg && tg.setBackgroundColor) tg.setBackgroundColor(bg); } catch (e) {}
      try { if (tg && tg.setHeaderColor) tg.setHeaderColor(bg); } catch (e) {}
    }
    function haptic(kind) {
      try { if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred(kind || "light"); } catch (e) {}
    }
    function setTheme(theme) {
      state.theme = theme;
      localStorage.setItem("pa_theme", theme);
      applyTheme();
    }
    function setLang(lang) {
      state.lang = lang;
      localStorage.setItem("pa_lang", lang);
      document.documentElement.setAttribute("lang", lang === "uz" ? "uz" : (lang === "en" ? "en" : "ru"));
      renderCurrent();
    }

    // ════════════════════════ Утилиты ════════════════════════
    function setStatus(text, kind) {
      if (!text) { statusEl.className = "status hidden"; statusEl.textContent = ""; return; }
      statusEl.textContent = text;
      statusEl.className = "status " + (kind || "info");
    }
    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function fmtDate(iso) {
      if (!iso) return t("notSet");
      try {
        const d = new Date(iso);
        const tz = state.timezone || null;
        const dOpts = tz ? { timeZone: tz } : {};
        const tOpts = tz ? { hour:"2-digit", minute:"2-digit", timeZone: tz } : { hour:"2-digit", minute:"2-digit" };
        const loc = state.lang === "en" ? "en-GB" : (state.lang === "uz" ? "uz-UZ" : "ru-RU");
        return d.toLocaleDateString(loc, dOpts) + " " + d.toLocaleTimeString(loc, tOpts);
      } catch (e) { return iso; }
    }
    function errText(data, status) {
      if (!data) return t("notSet") + " " + status;
      const d = data.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d) && d.length) return d.map(e => e.msg || JSON.stringify(e)).join("; ");
      return "" + status;
    }
    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); setStatus(t("copied"), "ok"); }
      catch (e) { window.prompt(t("copy") + ":", text); }
    }

    // ════════════════════════ Сеть ════════════════════════
    async function api(path, opts) {
      opts = opts || {};
      const headers = { "Content-Type": "application/json" };
      if (state.token) headers["Authorization"] = "Bearer " + state.token;
      const res = await fetch(path, {
        method: opts.method || "GET",
        headers,
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      let data = null;
      try { data = await res.json(); } catch (e) { data = null; }
      return { ok: res.ok, status: res.status, data };
    }
    async function login(initData) {
      return api("/api/v1/auth/telegram", { method: "POST", body: { init_data: initData } });
    }
    async function redeem(initData, code) {
      return api("/api/v1/invites/redeem", { method: "POST", body: { init_data: initData, code } });
    }

    // ════════════════════════ Навигация ════════════════════════
    // Каждый экран — { titleKey, render }. Стек хранит экраны для кнопки «Назад».
    const nav = { stack: [] };
    function renderCurrent() {
      const screen = nav.stack[nav.stack.length - 1];
      if (!screen) return;
      const title = screen.titleKey ? t(screen.titleKey) : "";
      titleEl.textContent = title;
      const hasBack = nav.stack.length > 1;
      backBtn.style.display = hasBack ? "" : "none";
      backBtn.textContent = "← " + t("back");
      // Пустую шапку (нет ни кнопки «Назад», ни заголовка) скрываем,
      // чтобы над герой-карточкой не было пустой полосы.
      if (hdrEl) hdrEl.style.display = (hasBack || title) ? "flex" : "none";
      if (tg && tg.BackButton) { try { hasBack ? tg.BackButton.show() : tg.BackButton.hide(); } catch (e) {} }
      setStatus("", null);
      contentEl.innerHTML = "";
      contentEl.classList.remove("fade-in");
      void contentEl.offsetWidth;
      contentEl.classList.add("fade-in");
      screen.render(contentEl);
    }
    function navigate(screen) { haptic("light"); nav.stack.push(screen); renderCurrent(); }
    function back() { if (nav.stack.length > 1) { haptic("light"); nav.stack.pop(); renderCurrent(); } }
    function resetTo(screen) { nav.stack = [screen]; renderCurrent(); }
    backBtn.addEventListener("click", back);
    if (tg && tg.BackButton && tg.BackButton.onClick) { try { tg.BackButton.onClick(back); } catch (e) {} }

    // ════════════════════════ Общие UI-помощники ════════════════════════
    function el(html) { const d = document.createElement("div"); d.innerHTML = html.trim(); return d.firstElementChild; }

      const b = el(`<button class="menu-btn"><span class="ic">${icon}</span><span class="lbl">${esc(t(labelKey))}</span><span class="chev">›</span></button>`);

        <div class="row"><span>${esc(t("roleLbl"))}</span><span><b>${esc(roleLabel(u.role))}</b></span></div>`;
      if (u.telegram_id) rows += `<div class="row"><span>${esc(t("tgId"))}</span><span><b>${esc(u.telegram_id)}</b></span></div>`;
      return rows;
    }
    function optionTag(value, label, current) {
      return `<option value="${esc(value)}" ${String(value) === String(current == null ? "" : current) ? "selected" : ""}>${esc(label)}</option>`;
    }

    // ════════════════════════ Справочники (районы) и настройки ════════════════════════
    const refs = { district: [], loaded: false };

      refs.district = d.ok && Array.isArray(d.data) ? d.data : [];

      if (state.settingsLoaded && !force) return;
      const r = await api("/api/v1/agency/settings");
      if (r.ok && r.data) {
        state.defaultCurrency = r.data.default_currency || null;
        state.timezone = r.data.timezone || null;

        state.projectName = r.data.project_name || null;
        state.subscriptionExpiresAt = r.data.subscription_expires_at || null;

    // ════════════════════════ Форма объекта ════════════════════════
    function objFormInner(o) {
      o = o || {};
      const typeOpts = `<option value="">${esc(t("notSet"))}</option>` + OBJ_TYPE_VALUES.map(v => optionTag(v, typeLabel(v), o.type)).join("");

    function vNum(host, sel, isFloat) {
      const e2 = host.querySelector(sel); const v = ((e2 && e2.value) || "").trim();
      if (!v) return null; const n = isFloat ? parseFloat(v) : parseInt(v, 10);
      return isNaN(n) ? null : n;
    }
    function vStr(host, sel) {
      const e2 = host.querySelector(sel); const v = ((e2 && e2.value) || "").trim();
      return v || null;
    }
    // full=true (редактирование) — включаем все поля (пустые как null, чтобы очищать).
    function collectObjBody(host, full) {
      const body = {};
      const fields = {
        name: vStr(host, "#n-name"), type: vStr(host, "#n-type"), district: vStr(host, "#n-district"),
        address: vStr(host, "#n-address"), rooms: vNum(host, "#n-rooms", false), floor: vNum(host, "#n-floor", false),
        total_floors: vNum(host, "#n-tfloors", false), area: vNum(host, "#n-area", true), price: vNum(host, "#n-price", true),
        currency: host.querySelector("#n-currency").value, condition: vStr(host, "#n-condition"),
        phone: vStr(host, "#n-phone"), description: vStr(host, "#n-desc"),
      };
      Object.keys(fields).forEach(k => {
        if (full && k === "currency" && !fields[k]) return;
        if (full || fields[k] !== null) body[k] = fields[k];
      });
      return body;

    function buildShareCard(o) {
      const lines = [];
      lines.push("🏠 " + t("apartment") + " №" + (o.display_id || ""));
      if (o.name) lines.push("📋 " + o.name);
      if (o.type) lines.push("🏗 " + t("f_type") + ": " + typeLabel(o.type));
      if (o.district) lines.push("📍 " + t("f_district") + ": " + o.district);
      if (o.address) lines.push("🗺 " + t("f_address") + ": " + o.address);
      if (o.rooms != null) lines.push("🚪 " + t("f_rooms") + ": " + o.rooms);
      const fl = (o.floor != null && o.total_floors != null) ? (o.floor + "/" + o.total_floors) : (o.floor != null ? String(o.floor) : null);
      if (fl) lines.push("🏢 " + t("f_floor") + ": " + fl);
      if (o.area != null) lines.push("📐 " + o.area + " m²");
      if (o.condition) lines.push("🔧 " + condLabel(o.condition));
      if (o.price != null) lines.push("💵 " + o.price + " " + (o.currency || ""));
      if (o.phone) lines.push("📞 " + o.phone);
      if (o.description) lines.push("📝 " + o.description);
      return lines.join("\n");

    function shareToTelegram(text) {

    function renderObjectListInto(host, params) {
      const page = { offset: 0, total: 0 };
      const countEl = el(`<div class="meta" style="margin:6px 0"></div>`);
      const cards = el(`<div></div>`);
      const moreWrap = el(`<div></div>`);
      host.appendChild(countEl); host.appendChild(cards); host.appendChild(moreWrap);
      async function loadPage(append) {
        moreWrap.innerHTML = `<div class="empty">${esc(t("loading"))}</div>`;
        const p = new URLSearchParams();
        Object.keys(params).forEach(k => {
          const v = params[k];
          if (v == null || v === "") return;
          if (Array.isArray(v)) v.forEach(x => { if (x != null && x !== "") p.append(k, x); });
          else p.set(k, v);
        });
        if (!p.has("status")) p.set("status", "all");
        p.set("limit", "20"); p.set("offset", String(page.offset));
        const r = await api("/api/v1/apartments?" + p.toString());
        if (!r.ok) { moreWrap.innerHTML = `<div class="empty">${esc(t("error"))} (${r.status}).</div>`; return; }
        const items = (r.data && r.data.items) || [];
        page.total = r.data.total || 0; page.offset += items.length;
        if (!append && !items.length) { countEl.textContent = ""; cards.innerHTML = `<div class="empty">${esc(t("notFound"))}</div>`; moreWrap.innerHTML = ""; return; }
        countEl.textContent = t("found") + ": " + page.total;
        items.forEach(o => cards.appendChild(objCard(o)));
        const left = page.total - page.offset;
        if (left > 0) { const mb = el(`<button class="ghost full">${esc(t("showMore"))} (${left})</button>`); mb.addEventListener("click", () => loadPage(true)); moreWrap.innerHTML = ""; moreWrap.appendChild(mb); }
        else moreWrap.innerHTML = "";
      }
      loadPage(false);
    }
    function objectListScreen(params, titleKey) {
      return { titleKey, render(host) { renderObjectListInto(host, params); } };
    }

          box.appendChild(el(`<div class="item">
            <label>${esc(t("searchText"))}</label><input id="f-q" />
            <label>${esc(t("f_status"))}</label><select id="f-status">${statusOpts}</select>
            <label>${esc(t("f_type"))}</label>
            <div class="chips" id="f-types">${typeChips}</div>
            <div class="hint">${esc(t("typeMultiHint"))}</div>
            <label>${esc(t("f_district"))}</label>
            <div class="chips" id="f-districts">${distChips}</div>
            <div style="display:flex; gap:8px">
              <div style="flex:1"><label>${esc(t("roomsFrom"))}</label><input id="f-rmin" inputmode="numeric" /></div>
              <div style="flex:1"><label>${esc(t("to"))}</label><input id="f-rmax" inputmode="numeric" /></div>
            </div>
            <div style="display:flex; gap:8px">
              <div style="flex:1"><label>${esc(t("floorFrom"))}</label><input id="f-fmin" inputmode="numeric" /></div>
              <div style="flex:1"><label>${esc(t("to"))}</label><input id="f-fmax" inputmode="numeric" /></div>
            </div>
            <div style="display:flex; gap:8px">
              <div style="flex:1"><label>${esc(t("priceFrom"))}</label><input id="f-pmin" inputmode="numeric" /></div>
              <div style="flex:1"><label>${esc(t("to"))}</label><input id="f-pmax" inputmode="numeric" /></div>
            </div>
          </div>`));
          box.querySelectorAll("#f-types .chip, #f-districts .chip").forEach(c => c.addEventListener("click", () => c.classList.toggle("active")));
          const btn = el(`<button class="full">${esc(t("searchBtn"))}</button>`);
          btn.addEventListener("click", () => {
            const params = {};
            const gv = sel => (box.querySelector(sel).value || "").trim();
            params.status = gv("#f-status") || "all";
            const types = Array.from(box.querySelectorAll("#f-types .chip.active")).map(c => c.dataset.val);
            if (types.length) params.types = types;
            const districts = Array.from(box.querySelectorAll("#f-districts .chip.active")).map(c => c.dataset.val);
            if (districts.length) params.districts = districts;
            const rmin = gv("#f-rmin"); if (rmin) params.rooms_min = rmin;
            const rmax = gv("#f-rmax"); if (rmax) params.rooms_max = rmax;
            const q = gv("#f-q"); if (q) params.q = q;
            const fmin = gv("#f-fmin"); if (fmin) params.floor_min = fmin;
            const fmax = gv("#f-fmax"); if (fmax) params.floor_max = fmax;
            const pmin = gv("#f-pmin"); if (pmin) params.price_min = pmin;
            const pmax = gv("#f-pmax"); if (pmax) params.price_max = pmax;
            navigate(objectListScreen(params, "findObject"));
          });
          box.appendChild(btn);
        });
      }};
    }

    function objectDetailScreen(id) {
      return { titleKey: "apartment", render(host) {
        const box = el(`<div><div class="empty">${esc(t("loading"))}</div></div>`);
        host.appendChild(box);
        renderObjDetail(box, id);
      }};
    }
    async function renderObjDetail(box, id) {
      const r = await api("/api/v1/apartments/" + id);
      if (!r.ok) { box.innerHTML = `<div class="empty">${esc(t("error"))} (${r.status}).</div>`; return; }
      const o = r.data;
      const badge = STATUS_BADGE[o.status] || "gray";
      const floorTxt = (o.floor != null && o.total_floors != null) ? (o.floor + " / " + o.total_floors) : (o.floor != null ? String(o.floor) : null);
      const rows = [
        [t("f_name"), o.name], [t("f_type"), o.type ? typeLabel(o.type) : null], [t("f_district"), o.district], [t("f_address"), o.address],
        [t("f_rooms"), o.rooms], [t("f_floor"), floorTxt], [t("f_area"), o.area],
        [t("f_price"), o.price != null ? (o.price + " " + (o.currency || "")) : null], [t("f_condition"), o.condition ? condLabel(o.condition) : null],
        [t("f_phone"), o.phone], [t("f_desc"), o.description], [t("addedBy"), o.created_by_name],
        (o.status === "sold" && o.archived_at) ? [t("soldDate"), fmtDate(o.archived_at)] : [null, null],
      ];
      const rowsHtml = rows.filter(x => x[1] != null && x[1] !== "").map(x => `<div class="row"><span>${esc(x[0])}</span><span><b>${esc(String(x[1]))}</b></span></div>`).join("");
      const transitions = {
        active: [["deposit","toDeposit"],["sold","toSold"]],
        deposit: [["active","removeDeposit"],["sold","toSold"]],
        sold: [["active","backToActive"]],
        archived: [["active","backToActive"]],
      };
      box.innerHTML = "";
      box.appendChild(el(`<div class="item">
        <div class="top"><span class="title">№${esc(o.display_id)}</span><span class="badge ${badge}">${esc(statusLabel(o.status))}</span></div>
        ${rowsHtml}
      </div>`));
      const stWrap = el(`<div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap"></div>`);
      (transitions[o.status] || []).forEach(tr => {
        const b = el(`<button class="small ghost">${esc(t(tr[1]))}</button>`);
        b.addEventListener("click", async () => {
          setStatus(t("changingStatus"), "info");
          const rr = await api("/api/v1/apartments/" + o.id + "/status", { method: "POST", body: { status: tr[0] } });
          if (rr.ok) { setStatus(t("done"), "ok"); renderObjDetail(box, id); } else setStatus(t("error") + ": " + errText(rr.data, rr.status), "err");
        });
        stWrap.appendChild(b);
      });
      box.appendChild(stWrap);
      const card = buildShareCard(o);
      const shWrap = el(`<div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap"></div>`);
      const cpy = el(`<button class="small ghost">${esc(t("shareCard"))}</button>`); cpy.addEventListener("click", () => copyText(card));
      const stgb = el(`<button class="small ghost">${esc(t("shareTg"))}</button>`); stgb.addEventListener("click", () => shareToTelegram(card));
      shWrap.appendChild(cpy); shWrap.appendChild(stgb); box.appendChild(shWrap);
      const eWrap = el(`<div style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap"></div>`);
      const edit = el(`<button class="small ghost">${esc(t("edit"))}</button>`); edit.addEventListener("click", () => navigate(objectEditScreen(o)));
      eWrap.appendChild(edit);
      const del = el(`<button class="small danger">${esc(t("del"))}</button>`);
      del.addEventListener("click", async () => {
        if (!window.confirm(t("delObjQ"))) return;
        const rr = await api("/api/v1/apartments/" + o.id, { method: "DELETE" });
        if (rr.ok) { setStatus(t("objDeleted"), "ok"); back(); } else setStatus(t("error") + ": " + errText(rr.data, rr.status), "err");
      });
      eWrap.appendChild(del);
      box.appendChild(eWrap);

      // История действий по объекту (кто создал / менял / сменил статус).
      const histWrap = el(`<div></div>`);
      box.appendChild(histWrap);
      renderHistoryInto(histWrap, id);
    }

    const EV_FIELD_KEYS = {
      name:"f_name", type:"f_type", district:"f_district", address:"f_address", rooms:"f_rooms",
      floor:"f_floor", total_floors:"f_tfloors", area:"f_area", price:"f_price", currency:"f_currency",
      condition:"f_condition", phone:"f_phone", description:"f_desc",
    };
    function eventText(e) {
      if (e.action === "created") return t("ev_created");
      if (e.action === "status") return t("ev_status") + ": " + statusLabel(e.note);
      if (e.action === "updated") {
        const fields = (e.note || "").split(",").filter(Boolean).map(k => t(EV_FIELD_KEYS[k] || k));
        return t("ev_updated") + (fields.length ? (": " + fields.join(", ")) : "");
      }
      return e.action;
    }
    async function renderHistoryInto(host, id) {
      const r = await api("/api/v1/apartments/" + id + "/events");
      if (!r.ok || !Array.isArray(r.data) || !r.data.length) return;
      host.appendChild(el(`<h2>${esc(t("history"))}</h2>`));
      r.data.forEach(e => {
        const who = e.user_name ? esc(e.user_name) : t("notSet");
        host.appendChild(el(`<div class="item"><div class="meta"><b>${who}</b> · ${esc(eventText(e))}</div><div class="meta">${fmtDate(e.created_at)}</div></div>`));
      });
    }

    function objectEditScreen(o) {
      return { titleKey: "edit", render(host) {
        const box = el(`<div><div class="empty">${esc(t("loading"))}</div></div>`);
        host.appendChild(box);
        Promise.all([loadRefs(), loadAgencySettings()]).then(() => {
          box.innerHTML = "";
          box.appendChild(el(`<div class="item">${objFormInner(o)}<div class="hint">${esc(t("clearHint"))}</div></div>`));
          const saveBtn = el(`<button class="full">${esc(t("saveChanges"))}</button>`);
          saveBtn.addEventListener("click", async () => {
            const body = collectObjBody(box, true);
            saveBtn.disabled = true; setStatus(t("saving"), "info");
            const r = await api("/api/v1/apartments/" + o.id, { method: "PATCH", body });
            saveBtn.disabled = false;
            if (r.ok) { setStatus(t("saved"), "ok"); back(); } else setStatus(t("error") + ": " + errText(r.data, r.status), "err");
          });
          box.appendChild(saveBtn);
        });
      }};
    }

    // ════════════════════════ Команда ════════════════════════
    function teamScreen() {
      return { titleKey: "team", render(host) {
        const box = el(`<div><div class="empty">${esc(t("loading"))}</div></div>`); host.appendChild(box);
        loadTeamInto(box);
      }};
    }
    async function loadTeamInto(box) {
      const r = await api("/api/v1/team");
      if (!r.ok) { box.innerHTML = `<div class="empty">${esc(t("error"))} (${r.status}).</div>`; return; }
      if (!r.data.length) { box.innerHTML = `<div class="empty">${esc(t("noMembers"))}</div>`; return; }
      box.innerHTML = "";
      const meOwner = !!(state.user && state.user.is_owner);
      r.data.forEach(m => {
        const isSelf = state.user && m.id === state.user.id;
        const name = m.full_name || (m.username ? "@" + m.username : ("ID " + m.telegram_id));
        const statusBadge = m.is_active ? `<span class="badge green">${esc(t("mActive"))}</span>` : `<span class="badge gray">${esc(t("mDisabled"))}</span>`;
        const ownerBadge = m.is_owner ? `<span class="badge amber">${esc(t("mainAdmin"))}</span>` : "";
        const item = el(`<div class="item">
          <div class="top"><span class="title">${esc(name)}</span><span style="display:flex; gap:6px">${ownerBadge}${statusBadge}</span></div>
          <div class="meta">${esc(roleLabel(m.role))}${m.username ? " · @" + esc(m.username) : ""}</div>
          <div class="acts" style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap"></div>
        </div>`);
        const acts = item.querySelector(".acts");
        // Кто кем может управлять: над администраторами и главным — только главный.
        const canAct = !isSelf && !m.is_owner && (m.role === "agent" || meOwner);
        if (isSelf) {
          acts.appendChild(el(`<span class="badge gray">${esc(t("itsYou"))}</span>`));
        } else if (canAct) {
          const tglBtn = el(`<button class="small ${m.is_active ? "danger" : "ghost"}">${esc(m.is_active ? t("disable") : t("enable"))}</button>`);
          tglBtn.addEventListener("click", async () => {
            const rr = await api("/api/v1/team/" + m.id, { method: "PATCH", body: { is_active: !m.is_active } });
            if (rr.ok) { setStatus(t("done"), "ok"); loadTeamInto(box); } else setStatus(t("error") + ": " + errText(rr.data, rr.status), "err");
          });
          acts.appendChild(tglBtn);
          const nextRole = m.role === "agency_admin" ? "agent" : "agency_admin";
          const rb = el(`<button class="small ghost">${esc(m.role === "agency_admin" ? t("demote") : t("promote"))}</button>`);
          rb.addEventListener("click", async () => {
            const roleName = nextRole === "agency_admin" ? t("role_agency_admin") : t("role_agent");
            if (!window.confirm(t("roleQ") + roleName + "»?")) return;
            const rr = await api("/api/v1/team/" + m.id, { method: "PATCH", body: { role: nextRole } });
            if (rr.ok) { setStatus(t("roleChanged"), "ok"); loadTeamInto(box); } else setStatus(t("error") + ": " + errText(rr.data, rr.status), "err");
          });
          acts.appendChild(rb);
          if (meOwner) {
            const ob = el(`<button class="small ghost">${esc(t("makeOwner"))}</button>`);
            ob.addEventListener("click", async () => {
              if (!window.confirm(t("makeOwnerQ"))) return;
              const rr = await api("/api/v1/team/" + m.id + "/owner", { method: "POST" });
              if (rr.ok) { state.user.is_owner = false; setStatus(t("ownerTransferred"), "ok"); loadTeamInto(box); }
              else setStatus(t("error") + ": " + errText(rr.data, rr.status), "err");
            });
            acts.appendChild(ob);
          }
        }
        box.appendChild(item);
      });
    }

    // ════════════════════════ Приглашения ════════════════════════
    function invitesScreen() {
      return { titleKey: "invites", render(host) {
        host.appendChild(el(`<label>${esc(t("inviteRole"))}</label>`));
        const roleSel = el(`<select><option value="agent">${esc(t("role_agent"))}</option><option value="agency_admin">${esc(t("role_agency_admin"))}</option></select>`);
        host.appendChild(roleSel);
        host.appendChild(el(`<label>${esc(t("inviteDays"))}</label>`));
        const daysInput = el(`<input inputmode="numeric" value="7" />`); host.appendChild(daysInput);
        const createBtn = el(`<button class="full">${esc(t("createInvite"))}</button>`); host.appendChild(createBtn);
        const created = el(`<div></div>`); host.appendChild(created);
        host.appendChild(el(`<h2>${esc(t("issuedInvites"))}</h2>`));
        const list = el(`<div><div class="empty">${esc(t("loading"))}</div></div>`); host.appendChild(list);
        createBtn.addEventListener("click", async () => {
          const days = parseInt((daysInput.value || "").trim(), 10);
          createBtn.disabled = true; setStatus(t("saving"), "info");
          const r = await api("/api/v1/invites", { method: "POST", body: { role: roleSel.value, expires_in_days: isNaN(days) ? 7 : days } });
          createBtn.disabled = false;
          if (!r.ok) { setStatus(t("error") + ": " + errText(r.data, r.status), "err"); return; }
          setStatus(t("inviteCreated"), "ok");
          const inv = r.data; const link = inv.join_link;
          created.innerHTML = "";
          const c = el(`<div class="item">
            <div class="meta">${esc(t("giveToEmployee"))}</div>
            ${link ? `<div class="codebox">${esc(link)}</div>` : ""}
            <div class="meta" style="margin-top:8px">${esc(t("codeLbl"))}:</div>
            <div class="codebox">${esc(inv.code)}</div>
            <div class="acts" style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap"></div>
          </div>`);
          const acts = c.querySelector(".acts");
          if (link) { const lb = el(`<button class="ghost small">${esc(t("copyLink"))}</button>`); lb.addEventListener("click", () => copyText(link)); acts.appendChild(lb); }
          const cb = el(`<button class="ghost small">${esc(t("copyCode"))}</button>`); cb.addEventListener("click", () => copyText(inv.code)); acts.appendChild(cb);
          created.appendChild(c);
          loadInvitesInto(list);
        });
        loadInvitesInto(list);
      }};
    }
    async function loadInvitesInto(box) {
      const r = await api("/api/v1/invites");
      if (!r.ok) { box.innerHTML = `<div class="empty">${esc(t("error"))} (${r.status}).</div>`; return; }
      if (!r.data.length) { box.innerHTML = `<div class="empty">${esc(t("noInvites"))}</div>`; return; }
      const stMap = { active: ["green","inv_active"], used: ["gray","inv_used"], expired: ["amber","inv_expired"] };
      box.innerHTML = "";
      r.data.forEach(inv => {
        const s = stMap[inv.status] || ["gray", null];
        const item = el(`<div class="item">
          <div class="top"><span class="title">${esc(roleLabel(inv.role))}</span><span class="badge ${s[0]}">${esc(s[1] ? t(s[1]) : inv.status)}</span></div>
          <div class="meta">${esc(t("codeLbl"))}: ${esc(inv.code)} · ${fmtDate(inv.expires_at)}</div>
          <div class="acts" style="margin-top:8px"></div>
        </div>`);
        const rev = el(`<button class="small danger">${esc(t("revoke"))}</button>`);
        rev.addEventListener("click", async () => {
          const rr = await api("/api/v1/invites/" + inv.id, { method: "DELETE" });
          if (rr.ok) { setStatus(t("revoked"), "ok"); loadInvitesInto(box); } else setStatus(t("error") + ": " + errText(rr.data, rr.status), "err");
        });
        item.querySelector(".acts").appendChild(rev);
        box.appendChild(item);
      });
    }

    // ════════════════════════ Вступление по коду ════════════════════════
    function joinScreen(prefill) {
      return { titleKey: "joinTitle", render(host) {
        host.appendChild(el(`<div class="status info">${esc(t("notInAgency"))}</div>`));
        host.appendChild(el(`<label>${esc(t("joinCodeLabel"))}</label>`));
        const input = el(`<input value="${esc(prefill || "")}" />`); host.appendChild(input);
        const btn = el(`<button class="full">${esc(t("joinBtn"))}</button>`); host.appendChild(btn);
        async function doJoin() {
          const code = (input.value || "").trim();
          if (!code) return;
          btn.disabled = true; setStatus(t("joinChecking"), "info");
          const r = await redeem(state.initData, code);
          if (r.ok) { state.token = r.data.access_token; state.user = r.data.user; state.subscriptionActive = r.data.subscription_active; afterLogin(); }
          else { btn.disabled = false; setStatus(t("loginFail") + errText(r.data, r.status), "err"); }
        }
        btn.addEventListener("click", doJoin);
        if (prefill) doJoin();
      }};
    }

    // ════════════════════════ Старт ════════════════════════
    async function afterLogin() {
      setStatus("", null);
      const role = state.user && state.user.role;
      if (role === "agency_admin" || role === "agent") {
        // Подтягиваем настройки агентства до показа главного экрана, чтобы
        // герой-карточка сразу показала название проекта и валюту по умолчанию.
        await loadAgencySettings(true);
      }
      if ((role === "agency_admin" || role === "agent") && state.subscriptionActive === false) { resetTo(suspendedScreen()); return; }
      resetTo(homeScreen());
    }

    async function main() {
      applyTheme();
      document.documentElement.setAttribute("lang", state.lang === "uz" ? "uz" : (state.lang === "en" ? "en" : "ru"));
      if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }
      state.initData = (tg && tg.initData) ? tg.initData : "";
      state.startParam = (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || "";

      if (!state.initData) {
        let backendOk = false;
        try { const res = await fetch("/health"); const d = await res.json(); backendOk = d.database === "connected"; } catch (e) {}
        resetTo({ titleKey: null, render(host) {
          host.appendChild(el(`<div class="status ${backendOk ? "ok" : "warn"}">${esc(backendOk ? t("backendOk") : t("backendErr"))}</div>`));
          host.appendChild(el(`<div class="hint">${esc(t("openInTg"))}</div>`));
        }});
        return;
      }

      setStatus(t("loginIn"), "info");
      try {
        const r = await login(state.initData);
        if (r.ok) { state.token = r.data.access_token; state.user = r.data.user; state.subscriptionActive = r.data.subscription_active; afterLogin(); return; }
        if (r.status === 403) { resetTo(joinScreen(state.startParam)); return; }
        setStatus(t("loginFail") + errText(r.data, r.status), "err");
      } catch (e) { setStatus(t("loginFail") + e.message, "err"); }
    }
    main();

  </script>
</body>
</html>
