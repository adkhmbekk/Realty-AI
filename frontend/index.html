<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Realty SaaS</title>
  <!-- Официальный скрипт Telegram Mini App: даёт доступ к данным пользователя. -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, system-ui, "Segoe UI", Roboto, sans-serif;
      background: #f3f4f6;
      color: #111827;
      display: flex;
      min-height: 100vh;
      align-items: flex-start;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      padding: 20px;
      max-width: 520px;
      width: 100%;
    }
    h1 { font-size: 20px; margin: 0 0 2px; }
    h2 { font-size: 17px; margin: 18px 0 10px; }
    .sub { color: #6b7280; font-size: 13px; margin: 0 0 16px; }
    .status {
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 14px;
    }
    .status.info { background: #eff6ff; color: #1e40af; }
    .status.ok   { background: #ecfdf5; color: #065f46; }
    .status.warn { background: #fffbeb; color: #92400e; }
    .status.err  { background: #fef2f2; color: #991b1b; }
    .status.hidden { display: none; }

    .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 14px; border-top: 1px solid #f0f0f0; }
    .row span:first-child { color: #6b7280; }

    label { display:block; font-size: 13px; color:#374151; margin: 10px 0 4px; }
    input, select {
      width: 100%; padding: 11px 12px; border: 1px solid #d1d5db;
      border-radius: 10px; font-size: 15px; background: #fff; color: #111827;
    }
    button {
      border: 0; border-radius: 10px; padding: 11px 14px; font-size: 15px;
      font-weight: 600; cursor: pointer; background: #2563eb; color: #fff;
    }
    button.full { width: 100%; margin-top: 12px; }
    button.ghost { background: #eef2ff; color: #3730a3; }
    button.danger { background: #fee2e2; color: #991b1b; }
    button.small { padding: 7px 10px; font-size: 13px; }
    button:disabled { opacity: .55; cursor: default; }

    .tabs { display: flex; gap: 8px; margin: 8px 0 4px; flex-wrap: wrap; }
    .tabs button {
      flex: 1; min-width: 88px; background: #f3f4f6; color: #374151; font-weight: 600;
      padding: 9px 8px; font-size: 13px;
    }
    .tabs button.active { background: #2563eb; color: #fff; }

    .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .chip {
      background:#f3f4f6; color:#374151; border:1px solid #e5e7eb;
      border-radius:999px; padding:6px 12px; font-size:13px; font-weight:600;
    }
    .chip.active { background:#2563eb; color:#fff; border-color:#2563eb; }
    .views { display:flex; gap:6px; margin:14px 0 6px; flex-wrap:wrap; }
    .views button { flex:1; min-width:80px; background:#f3f4f6; color:#374151; font-weight:600; padding:9px 8px; font-size:13px; }
    .views button.active { background:#111827; color:#fff; }

    .item {
      border: 1px solid #eef0f3; border-radius: 12px; padding: 12px;
      margin-top: 10px; background: #fcfcfd;
    }
    .item .top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .item .title { font-weight: 600; font-size: 15px; }
    .item .meta { color: #6b7280; font-size: 13px; margin-top: 3px; }
    .badge { font-size: 12px; padding: 3px 8px; border-radius: 999px; font-weight: 600; white-space: nowrap; }
    .badge.green { background:#dcfce7; color:#166534; }
    .badge.gray  { background:#e5e7eb; color:#374151; }
    .badge.red   { background:#fee2e2; color:#991b1b; }
    .badge.amber { background:#fef3c7; color:#92400e; }

    .codebox {
      background:#0f172a; color:#e2e8f0; border-radius:10px; padding:10px 12px;
      font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 13px;
      word-break: break-all; margin-top: 8px;
    }
    .muted { color: #9ca3af; font-size: 12px; margin-top: 14px; word-break: break-all; }
    .empty { color:#9ca3af; font-size: 14px; padding: 14px 0; text-align:center; }
    .hint { background:#f9fafb; border:1px solid #eef0f3; border-radius:10px; padding:10px 12px; font-size:13px; color:#4b5563; margin-top:10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Realty SaaS</h1>
    <p class="sub" id="subtitle">Приложение для риелторских агентств</p>

    <div id="status" class="status info">Загрузка…</div>
    <div id="content"></div>

    <p class="muted" id="debug"></p>
  </div>

  <script>
    // ───────────────────────── Состояние ─────────────────────────
    const state = { token: null, user: null, initData: "", startParam: "", subscriptionActive: null };

    const statusEl  = document.getElementById("status");
    const contentEl = document.getElementById("content");
    const subtitleEl = document.getElementById("subtitle");
    const debugEl   = document.getElementById("debug");

    function setStatus(text, kind) {
      if (!text) { statusEl.className = "status hidden"; return; }
      statusEl.textContent = text;
      statusEl.className = "status " + (kind || "info");
    }
    function esc(s) {
      return String(s == null ? "" : s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function fmtDate(iso) {
      if (!iso) return "—";
      try {
        const d = new Date(iso);
        const tz = (typeof agencySettings !== "undefined" && agencySettings.timezone) ? agencySettings.timezone : null;
        const dOpts = tz ? { timeZone: tz } : {};
        const tOpts = tz ? { hour: "2-digit", minute: "2-digit", timeZone: tz } : { hour: "2-digit", minute: "2-digit" };
        return d.toLocaleDateString("ru-RU", dOpts) + " " + d.toLocaleTimeString("ru-RU", tOpts);
      } catch (e) { return iso; }
    }
    function roleLabel(role) {
      switch (role) {
        case "superadmin":   return "Владелец платформы";
        case "agency_admin": return "Администратор агентства";
        case "agent":        return "Агент";
        default: return role || "—";
      }
    }
    async function copyText(text) {
      try { await navigator.clipboard.writeText(text); setStatus("Скопировано в буфер обмена.", "ok"); }
      catch (e) { window.prompt("Скопируйте вручную:", text); }
    }
    // Превращает поле detail из ответа (строка ИЛИ массив ошибок валидации) в текст.
    function errText(data, status) {
      if (!data) return "ошибка " + status;
      const d = data.detail;
      if (typeof d === "string") return d;
      if (Array.isArray(d) && d.length) return d.map(e => e.msg || JSON.stringify(e)).join("; ");
      return "ошибка " + status;
    }

    // ───────────────────────── Сеть ─────────────────────────
    async function api(path, opts) {
      opts = opts || {};
      const headers = { "Content-Type": "application/json" };
      if (state.token) headers["Authorization"] = "Bearer " + state.token;
      const res = await fetch(path, {
        method: opts.method || "GET",
        headers,
        body: opts.body ? JSON.stringify(opts.body) : undefined,
      });
      let data = null;
      try { data = await res.json(); } catch (e) { data = null; }
      return { ok: res.ok, status: res.status, data };
    }

    // ───────────────────────── Вход ─────────────────────────
    async function login(initData) {
      return api("/api/v1/auth/telegram", { method: "POST", body: { init_data: initData } });
    }
    async function redeem(initData, code) {
      return api("/api/v1/invites/redeem", { method: "POST", body: { init_data: initData, code } });
    }

    // ───────────────────── Экран: профиль (шапка) ─────────────────────
    function profileRows() {
      const u = state.user || {};
      return `
        <div class="row"><span>Имя</span><span><b>${esc(u.full_name || "—")}</b></span></div>
        <div class="row"><span>Username</span><span><b>${u.username ? "@" + esc(u.username) : "—"}</b></span></div>
        <div class="row"><span>Роль</span><span><b>${esc(roleLabel(u.role))}</b></span></div>`;
    }

    // ───────────────────── Маршрутизация по роли ─────────────────────
    function renderApp() {
      setStatus("", null);
      const role = state.user && state.user.role;
      // Жёсткая блокировка по подписке: сотрудникам неактивного агентства
      // показываем экран «доступ приостановлен» вместо рабочих разделов.
      if ((role === "agency_admin" || role === "agent") && state.subscriptionActive === false) {
        renderSuspended();
        return;
      }
      if (role === "superadmin")        renderSuperadmin();
      else if (role === "agency_admin") renderAgencyAdmin();
      else if (role === "agent")        renderAgent();
      else renderUnknown();
    }

    // ───────────────────── Экран: подписка неактивна ─────────────────────
    function renderSuspended() {
      subtitleEl.textContent = "Доступ приостановлен";
      contentEl.innerHTML = `
        ${profileRows()}
        <div class="status err" style="margin-top:14px">
          Подписка вашего агентства неактивна, поэтому доступ временно приостановлен.
          Все данные сохранены и никуда не делись. Чтобы возобновить работу,
          обратитесь к владельцу платформы для продления подписки.
        </div>`;
    }

    // ───────────────────── СУПЕРАДМИН: агентства ─────────────────────
    function renderSuperadmin() {
      subtitleEl.textContent = "Панель владельца платформы";
      contentEl.innerHTML = `
        ${profileRows()}
        <h2>Создать агентство</h2>
        <label>Название агентства</label>
        <input id="ag-name" placeholder="например, Уютный Дом" />
        <label>Telegram ID администратора</label>
        <input id="ag-admin-id" inputmode="numeric" placeholder="например, 123456789" />
        <label>Username администратора (необязательно)</label>
        <input id="ag-admin-username" placeholder="без @" />
        <label>Подписка на сколько дней</label>
        <input id="ag-days" inputmode="numeric" value="30" />
        <button class="full" id="ag-create">Создать агентство</button>
        <div class="hint">Администратор агентства — это отдельный человек (его Telegram ID).
          Войдя в приложение, он увидит разделы «Команда» и «Приглашения».</div>
        <h2>Агентства</h2>
        <div id="ag-list"><div class="empty">Загрузка…</div></div>`;

      document.getElementById("ag-create").addEventListener("click", createAgency);
      loadAgencies();
    }

    async function loadAgencies() {
      const box = document.getElementById("ag-list");
      const r = await api("/api/v1/agencies");
      if (!r.ok) { box.innerHTML = `<div class="empty">Не удалось загрузить (${r.status}).</div>`; return; }
      if (!r.data.length) { box.innerHTML = `<div class="empty">Пока нет ни одного агентства.</div>`; return; }
      box.innerHTML = r.data.map(a => {
        const st = (a.status === "active" || a.status === "trial") ? "green" : "amber";
        const frozen = a.status === "frozen";
        const adminTxt = a.admin_name
          ? esc(a.admin_name) + (a.admin_telegram_id ? " (ID " + a.admin_telegram_id + ")" : "")
          : "— не назначен —";
        return `<div class="item">
          <div class="top">
            <span class="title">${esc(a.name)}</span>
            <span class="badge ${st}">${esc(a.status)}</span>
          </div>
          <div class="meta">ID ${a.id} · подписка до: ${fmtDate(a.subscription_expires_at)}</div>
          <div class="meta">Админ: ${adminTxt}</div>
          <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap">
            <button class="small ghost" data-sub="extend" data-id="${a.id}">+30 дней</button>
            ${frozen
              ? `<button class="small ghost" data-sub="activate" data-id="${a.id}">Активировать</button>`
              : `<button class="small danger" data-sub="freeze" data-id="${a.id}">Заморозить</button>`}
          </div>
          <div style="margin-top:6px; display:flex; gap:6px; flex-wrap:wrap">
            <button class="small ghost" data-rename="${a.id}" data-name="${esc(a.name)}">Переименовать</button>
            <button class="small ghost" data-admin="${a.id}">Сменить админа</button>
            <button class="small danger" data-del-ag="${a.id}" data-name="${esc(a.name)}">Удалить</button>
          </div>
        </div>`;
      }).join("");
      box.querySelectorAll("button[data-sub]").forEach(b =>
        b.addEventListener("click", () => subAction(b.dataset.sub, parseInt(b.dataset.id, 10))));
      box.querySelectorAll("button[data-rename]").forEach(b =>
        b.addEventListener("click", () => renameAgency(parseInt(b.dataset.rename, 10), b.dataset.name)));
      box.querySelectorAll("button[data-admin]").forEach(b =>
        b.addEventListener("click", () => changeAgencyAdmin(parseInt(b.dataset.admin, 10))));
      box.querySelectorAll("button[data-del-ag]").forEach(b =>
        b.addEventListener("click", () => deleteAgency(parseInt(b.dataset.delAg, 10), b.dataset.name)));
    }

    async function subAction(action, id) {
      setStatus("Обновляем подписку…", "info");
      const body = { action };
      if (action === "extend") body.days = 30;
      const r = await api("/api/v1/agencies/" + id + "/subscription", { method: "POST", body });
      if (r.ok) { setStatus("Готово.", "ok"); loadAgencies(); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    async function renameAgency(id, currentName) {
      const name = window.prompt("Новое название агентства:", currentName || "");
      if (name === null) return;
      const trimmed = name.trim();
      if (!trimmed) { setStatus("Название не может быть пустым.", "warn"); return; }
      setStatus("Переименовываем…", "info");
      const r = await api("/api/v1/agencies/" + id, { method: "PATCH", body: { name: trimmed } });
      if (r.ok) { setStatus("Готово.", "ok"); loadAgencies(); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    async function changeAgencyAdmin(id) {
      const idStr = window.prompt("Telegram ID нового администратора агентства:", "");
      if (idStr === null) return;
      const tgId = parseInt((idStr || "").trim(), 10);
      if (isNaN(tgId)) { setStatus("Введите корректный Telegram ID (число).", "warn"); return; }
      const username = window.prompt("Username администратора (необязательно, без @):", "");
      if (username === null) return;
      const body = { admin_telegram_id: tgId };
      const u = (username || "").trim();
      if (u) body.admin_username = u;
      setStatus("Назначаем администратора…", "info");
      const r = await api("/api/v1/agencies/" + id + "/admin", { method: "POST", body });
      if (r.ok) { setStatus("Администратор назначен.", "ok"); loadAgencies(); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    async function deleteAgency(id, name) {
      if (!window.confirm("Удалить агентство «" + (name || id) + "» со ВСЕМИ его данными (объекты, команда, приглашения, районы)? Это необратимо.")) return;
      if (!window.confirm("Точно удалить? Данные восстановить будет нельзя.")) return;
      setStatus("Удаляем агентство…", "info");
      const r = await api("/api/v1/agencies/" + id, { method: "DELETE" });
      if (r.ok) { setStatus("Агентство удалено.", "ok"); loadAgencies(); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    async function createAgency() {
      const btn = document.getElementById("ag-create");
      const name = document.getElementById("ag-name").value.trim();
      const adminId = document.getElementById("ag-admin-id").value.trim();
      const username = document.getElementById("ag-admin-username").value.trim();
      const days = parseInt(document.getElementById("ag-days").value, 10);
      if (!name) { setStatus("Введите название агентства.", "warn"); return; }
      if (!adminId || isNaN(parseInt(adminId, 10))) { setStatus("Введите корректный Telegram ID администратора.", "warn"); return; }
      btn.disabled = true; setStatus("Создаём агентство…", "info");
      const body = { name, admin_telegram_id: parseInt(adminId, 10), subscription_days: isNaN(days) ? 30 : days };
      if (username) body.admin_username = username;
      const r = await api("/api/v1/agencies", { method: "POST", body });
      btn.disabled = false;
      if (r.ok) {
        setStatus("Агентство «" + name + "» создано.", "ok");
        document.getElementById("ag-name").value = "";
        document.getElementById("ag-admin-id").value = "";
        document.getElementById("ag-admin-username").value = "";
        loadAgencies();
      } else {
        setStatus("Ошибка: " + ((r.data && r.data.detail) || r.status), "err");
      }
    }

    // ───────────────────── АДМИН АГЕНТСТВА: команда + приглашения ─────────────────────
    function renderAgencyAdmin() {
      subtitleEl.textContent = "Панель администратора агентства";
      contentEl.innerHTML = `
        ${profileRows()}
        <div class="tabs">
          <button id="tab-objects" class="active">Объекты</button>
          <button id="tab-team">Команда</button>
          <button id="tab-invites">Приглашения</button>
          <button id="tab-districts">Районы</button>
          <button id="tab-settings">Настройки</button>
        </div>
        <div id="tab-body"></div>`;
      document.getElementById("tab-objects").addEventListener("click", () => switchTab("objects"));
      document.getElementById("tab-team").addEventListener("click", () => switchTab("team"));
      document.getElementById("tab-invites").addEventListener("click", () => switchTab("invites"));
      document.getElementById("tab-districts").addEventListener("click", () => switchTab("districts"));
      document.getElementById("tab-settings").addEventListener("click", () => switchTab("settings"));
      switchTab("objects");
    }

    function switchTab(which) {
      document.getElementById("tab-objects").classList.toggle("active", which === "objects");
      document.getElementById("tab-team").classList.toggle("active", which === "team");
      document.getElementById("tab-invites").classList.toggle("active", which === "invites");
      document.getElementById("tab-districts").classList.toggle("active", which === "districts");
      document.getElementById("tab-settings").classList.toggle("active", which === "settings");
      const body = document.getElementById("tab-body");
      if (which === "objects") objectsScreen(body);
      else if (which === "team") renderTeamTab();
      else if (which === "invites") renderInvitesTab();
      else if (which === "districts") renderDistrictsTab();
      else renderSettingsTab();
    }

    // --- Вкладка «Команда» ---
    function renderTeamTab() {
      const body = document.getElementById("tab-body");
      body.innerHTML = `<h2>Сотрудники агентства</h2><div id="team-list"><div class="empty">Загрузка…</div></div>`;
      loadTeam();
    }
    async function loadTeam() {
      const box = document.getElementById("team-list");
      const r = await api("/api/v1/team");
      if (!r.ok) { box.innerHTML = `<div class="empty">Не удалось загрузить (${r.status}).</div>`; return; }
      if (!r.data.length) { box.innerHTML = `<div class="empty">Сотрудников пока нет.</div>`; return; }
      box.innerHTML = r.data.map(m => {
        const isSelf = state.user && m.id === state.user.id;
        const name = m.full_name || (m.username ? "@" + m.username : ("ID " + m.telegram_id));
        const statusBadge = m.is_active
          ? `<span class="badge green">активен</span>`
          : `<span class="badge gray">отключён</span>`;
        // Кнопка смены роли: агент ↔ администратор агентства (себе менять нельзя).
        const nextRole = m.role === "agency_admin" ? "agent" : "agency_admin";
        const roleBtnLabel = m.role === "agency_admin" ? "Сделать агентом" : "Повысить до админа";
        const roleBtn = isSelf
          ? ""
          : `<button class="small ghost" data-role-id="${m.id}" data-role="${nextRole}">${roleBtnLabel}</button>`;
        const action = isSelf
          ? `<span class="badge gray">это вы</span>`
          : `<button class="small ${m.is_active ? "danger" : "ghost"}" data-id="${m.id}" data-active="${m.is_active ? 1 : 0}">
               ${m.is_active ? "Отключить" : "Включить"}</button>`;
        return `<div class="item">
          <div class="top"><span class="title">${esc(name)}</span>${statusBadge}</div>
          <div class="meta">${esc(roleLabel(m.role))}${m.username ? " · @" + esc(m.username) : ""}</div>
          <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap">${action}${roleBtn}</div>
        </div>`;
      }).join("");
      box.querySelectorAll("button[data-id]").forEach(b => {
        b.addEventListener("click", () => toggleMember(parseInt(b.dataset.id, 10), b.dataset.active !== "1"));
      });
      box.querySelectorAll("button[data-role-id]").forEach(b => {
        b.addEventListener("click", () => changeMemberRole(parseInt(b.dataset.roleId, 10), b.dataset.role));
      });
    }
    async function toggleMember(id, makeActive) {
      setStatus("Сохраняем…", "info");
      const r = await api("/api/v1/team/" + id, { method: "PATCH", body: { is_active: makeActive } });
      if (r.ok) { setStatus("Готово.", "ok"); loadTeam(); }
      else setStatus("Ошибка: " + ((r.data && r.data.detail) || r.status), "err");
    }
    async function changeMemberRole(id, newRole) {
      const roleName = newRole === "agency_admin" ? "администратора агентства" : "агента";
      if (!window.confirm("Назначить сотруднику роль «" + roleName + "»?")) return;
      setStatus("Меняем роль…", "info");
      const r = await api("/api/v1/team/" + id, { method: "PATCH", body: { role: newRole } });
      if (r.ok) { setStatus("Роль изменена.", "ok"); loadTeam(); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    // --- Вкладка «Приглашения» ---
    function renderInvitesTab() {
      const body = document.getElementById("tab-body");
      body.innerHTML = `
        <h2>Создать приглашение</h2>
        <label>Роль приглашаемого</label>
        <select id="inv-role">
          <option value="agent">Агент</option>
          <option value="agency_admin">Администратор агентства</option>
        </select>
        <label>Срок действия, дней</label>
        <input id="inv-days" inputmode="numeric" value="7" />
        <button class="full" id="inv-create">Создать приглашение</button>
        <div id="inv-created"></div>
        <h2>Выданные приглашения</h2>
        <div id="inv-list"><div class="empty">Загрузка…</div></div>`;
      document.getElementById("inv-create").addEventListener("click", createInvite);
      loadInvites();
    }
    async function createInvite() {
      const btn = document.getElementById("inv-create");
      const role = document.getElementById("inv-role").value;
      const days = parseInt(document.getElementById("inv-days").value, 10);
      btn.disabled = true; setStatus("Создаём приглашение…", "info");
      const r = await api("/api/v1/invites", { method: "POST", body: { role, expires_in_days: isNaN(days) ? 7 : days } });
      btn.disabled = false;
      if (!r.ok) { setStatus("Ошибка: " + ((r.data && r.data.detail) || r.status), "err"); return; }
      setStatus("Приглашение создано.", "ok");
      const inv = r.data;
      const link = inv.join_link;
      document.getElementById("inv-created").innerHTML = `
        <div class="item">
          <div class="meta">Передайте это приглашаемому сотруднику:</div>
          ${link ? `<div class="codebox">${esc(link)}</div>
                    <button class="ghost small" id="copy-link" style="margin-top:8px">Копировать ссылку</button>` : ""}
          <div class="meta" style="margin-top:8px">Код:</div>
          <div class="codebox">${esc(inv.code)}</div>
          <button class="ghost small" id="copy-code" style="margin-top:8px">Копировать код</button>
        </div>`;
      const cl = document.getElementById("copy-link");
      if (cl) cl.addEventListener("click", () => copyText(link));
      document.getElementById("copy-code").addEventListener("click", () => copyText(inv.code));
      loadInvites();
    }
    async function loadInvites() {
      const box = document.getElementById("inv-list");
      const r = await api("/api/v1/invites");
      if (!r.ok) { box.innerHTML = `<div class="empty">Не удалось загрузить (${r.status}).</div>`; return; }
      if (!r.data.length) { box.innerHTML = `<div class="empty">Приглашений пока нет.</div>`; return; }
      const stMap = { active: ["green","активно"], used: ["gray","использовано"], expired: ["amber","просрочено"] };
      box.innerHTML = r.data.map(inv => {
        const s = stMap[inv.status] || ["gray", inv.status];
        return `<div class="item">
          <div class="top">
            <span class="title">${esc(roleLabel(inv.role))}</span>
            <span class="badge ${s[0]}">${s[1]}</span>
          </div>
          <div class="meta">код: ${esc(inv.code)} · до ${fmtDate(inv.expires_at)}</div>
          <div style="margin-top:8px">
            <button class="small danger" data-revoke="${inv.id}">Отозвать</button>
          </div>
        </div>`;
      }).join("");
      box.querySelectorAll("button[data-revoke]").forEach(b => {
        b.addEventListener("click", () => revokeInvite(parseInt(b.dataset.revoke, 10)));
      });
    }
    async function revokeInvite(id) {
      setStatus("Отзываем приглашение…", "info");
      const r = await api("/api/v1/invites/" + id, { method: "DELETE" });
      if (r.ok) { setStatus("Приглашение отозвано.", "ok"); loadInvites(); }
      else setStatus("Ошибка: " + ((r.data && r.data.detail) || r.status), "err");
    }

    // --- Вкладка «Районы» (справочник районов агентства) ---
    function renderDistrictsTab() {
      const body = document.getElementById("tab-body");
      body.innerHTML = `
        <h2>Районы агентства</h2>
        <div class="hint">Эти районы используются в форме объекта и в фильтрах поиска. Тип объекта и состояние — фиксированные списки и не меняются здесь.</div>
        <label>Новый район</label>
        <input id="dist-name" placeholder="например, Центр" />
        <button class="full" id="dist-add">Добавить район</button>
        <div id="dist-list" style="margin-top:8px"><div class="empty">Загрузка…</div></div>`;
      document.getElementById("dist-add").addEventListener("click", addDistrict);
      loadDistricts();
    }
    async function loadDistricts() {
      const box = document.getElementById("dist-list");
      const r = await api("/api/v1/dictionaries?category=district");
      if (!r.ok) { box.innerHTML = `<div class="empty">Не удалось загрузить (${r.status}).</div>`; return; }
      if (!r.data.length) { box.innerHTML = `<div class="empty">Районов пока нет.</div>`; return; }
      box.innerHTML = r.data.map(d => `<div class="item">
        <div class="top">
          <span class="title">${esc(d.value)}</span>
          <button class="small danger" data-del-dist="${d.id}">Удалить</button>
        </div>
      </div>`).join("");
      box.querySelectorAll("button[data-del-dist]").forEach(b =>
        b.addEventListener("click", () => deleteDistrict(parseInt(b.dataset.delDist, 10))));
    }
    async function addDistrict() {
      const input = document.getElementById("dist-name");
      const value = (input.value || "").trim();
      if (!value) { setStatus("Введите название района.", "warn"); return; }
      setStatus("Добавляем…", "info");
      const r = await api("/api/v1/dictionaries", { method: "POST", body: { category: "district", value } });
      if (r.ok) { setStatus("Район добавлен.", "ok"); input.value = ""; refs.loaded = false; loadDistricts(); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }
    async function deleteDistrict(id) {
      if (!window.confirm("Удалить район?")) return;
      setStatus("Удаляем…", "info");
      const r = await api("/api/v1/dictionaries/" + id, { method: "DELETE" });
      if (r.ok) { setStatus("Район удалён.", "ok"); refs.loaded = false; loadDistricts(); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    // --- Вкладка «Настройки» (валюта по умолчанию и часовой пояс агентства) ---
    function renderSettingsTab() {
      const body = document.getElementById("tab-body");
      body.innerHTML = `
        <h2>Настройки агентства</h2>
        <div class="hint">Валюта по умолчанию подставляется в форму нового объекта. Часовой пояс влияет на отображение дат.</div>
        <label>Валюта по умолчанию</label>
        <select id="set-currency">
          <option value="USD">USD</option>
          <option value="UZS">UZS</option>
          <option value="EUR">EUR</option>
        </select>
        <label>Часовой пояс</label>
        <input id="set-tz" placeholder="например, Asia/Tashkent" />
        <button class="full" id="set-save">Сохранить настройки</button>`;
      loadSettingsForm();
      document.getElementById("set-save").addEventListener("click", saveSettings);
    }
    async function loadSettingsForm() {
      await loadAgencySettings(true);
      const cur = document.getElementById("set-currency");
      const tz = document.getElementById("set-tz");
      if (cur && agencySettings.default_currency) cur.value = agencySettings.default_currency;
      if (tz) tz.value = agencySettings.timezone || "";
    }
    async function saveSettings() {
      const currency = document.getElementById("set-currency").value;
      const timezone = (document.getElementById("set-tz").value || "").trim();
      setStatus("Сохраняем настройки…", "info");
      const r = await api("/api/v1/agency/settings", {
        method: "PATCH",
        body: { default_currency: currency, timezone: timezone || null },
      });
      if (r.ok) {
        setStatus("Настройки сохранены.", "ok");
        agencySettings.default_currency = r.data.default_currency || null;
        agencySettings.timezone = r.data.timezone || null;
        agencySettings.loaded = true;
      } else {
        setStatus("Ошибка: " + errText(r.data, r.status), "err");
      }
    }

    // ───────────────────── АГЕНT ─────────────────────
    function renderAgent() {
      subtitleEl.textContent = "Панель агента";
      contentEl.innerHTML = `${profileRows()}<div id="agent-objects"></div>`;
      objectsScreen(document.getElementById("agent-objects"));
    }

    function renderUnknown() {
      contentEl.innerHTML = profileRows();
    }

    // ───────────────────── ОБЪЕКТЫ (UI Этапа 3) ─────────────────────
    // Справочник районов грузим один раз и кэшируем (нужен для формы и фильтров).
    const refs = { district: [], loaded: false };

    // Настройки агентства кэшируем (валюта по умолчанию для формы, часовой пояс для дат).
    const agencySettings = { default_currency: null, timezone: null, loaded: false };

    async function loadAgencySettings(force) {
      if (agencySettings.loaded && !force) return;
      const r = await api("/api/v1/agency/settings");
      if (r.ok && r.data) {
        agencySettings.default_currency = r.data.default_currency || null;
        agencySettings.timezone = r.data.timezone || null;
        agencySettings.loaded = true;
      }
    }

    async function loadRefs() {
      if (refs.loaded) return;
      const d = await api("/api/v1/dictionaries?category=district");
      refs.district = d.ok && Array.isArray(d.data) ? d.data : [];
      refs.loaded = true;
    }

    function optList(arr, valueKey) {
      return arr.map(x => `<option value="${esc(x[valueKey])}">${esc(x[valueKey])}</option>`).join("");
    }

    // Фиксированные списки (единые для всех агентств).
    const OBJ_TYPES = ["Квартира", "Дом", "Коммерция", "Земля"];
    const OBJ_CONDITIONS = ["Без ремонта", "Черновая", "White box", "Средний ремонт", "Новый ремонт", "Дизайнерский ремонт"];
    const STATUS_LABELS = { active: "Активен", deposit: "Задаток", sold: "Продан", archived: "Архив" };
    const STATUS_BADGE  = { active: "green", deposit: "amber", sold: "gray", archived: "gray" };

    // Текущий «вид» списка объектов (какой статус показываем).
    let objView = "active";

    // Пагинация списка объектов: грузим порциями и докручиваем «Показать ещё».
    const OBJ_PAGE_SIZE = 20;
    let objPage = { offset: 0, total: 0 };

    // --- Мультивыбор «чипами» ---
    function chips(id, values) {
      return `<div class="chips" id="${id}">` +
        values.map(v => `<button type="button" class="chip" data-val="${esc(v)}">${esc(v)}</button>`).join("") +
        `</div>`;
    }
    function wireChips(host, id) {
      host.querySelectorAll("#" + id + " .chip").forEach(b =>
        b.addEventListener("click", () => b.classList.toggle("active")));
    }
    function pickedChips(host, id) {
      return Array.from(host.querySelectorAll("#" + id + " .chip.active")).map(b => b.dataset.val);
    }

    async function objectsScreen(host) {
      host.innerHTML = `
        <h2>Объекты недвижимости</h2>
        <button class="ghost full" id="obj-new-toggle">+ Создать объект</button>
        <div id="obj-form"></div>

        <div class="views" id="obj-views">
          <button data-view="active">Активные</button>
          <button data-view="deposit">Задаток</button>
          <button data-view="sold">Проданные</button>
          <button data-view="archived">Архив</button>
        </div>

        <div class="item" style="background:#fff">
          <label>Поиск (наименование, адрес, № объекта)</label>
          <input id="f-q" placeholder="например: центр, Навои, 0001" />
          <label>Тип объекта</label>
          ${chips("f-types", OBJ_TYPES)}
          <label>Район</label>
          <div class="chips" id="f-districts"></div>
          <label>Комнат</label>
          ${chips("f-rooms", ["1", "2", "3", "4", "5"])}
          <div style="display:flex; gap:8px">
            <div style="flex:1"><label>Этаж от</label><input id="f-fmin" inputmode="numeric" /></div>
            <div style="flex:1"><label>до</label><input id="f-fmax" inputmode="numeric" /></div>
          </div>
          <div style="display:flex; gap:8px">
            <div style="flex:1"><label>Цена от</label><input id="f-pmin" inputmode="numeric" /></div>
            <div style="flex:1"><label>до</label><input id="f-pmax" inputmode="numeric" /></div>
          </div>
          <button class="full" id="obj-search">Найти</button>
        </div>
        <div id="obj-results"><div class="empty">Загрузка…</div></div>`;

      await loadRefs();
      await loadAgencySettings();
      const dbox = host.querySelector("#f-districts");
      dbox.innerHTML = refs.district.length
        ? refs.district.map(x => `<button type="button" class="chip" data-val="${esc(x.value)}">${esc(x.value)}</button>`).join("")
        : `<span class="muted">Районы не заданы</span>`;
      wireChips(host, "f-types");
      wireChips(host, "f-districts");
      wireChips(host, "f-rooms");

      const views = host.querySelector("#obj-views");
      function paintViews() {
        views.querySelectorAll("button").forEach(b => b.classList.toggle("active", b.dataset.view === objView));
      }
      views.querySelectorAll("button").forEach(b => b.addEventListener("click", () => {
        objView = b.dataset.view; paintViews(); searchObjects(host);
      }));
      paintViews();

      host.querySelector("#obj-new-toggle").addEventListener("click", () => toggleObjForm(host));
      host.querySelector("#obj-search").addEventListener("click", () => searchObjects(host));
      searchObjects(host);
    }

    // Поля формы объекта (общие для создания и редактирования).
    // o — объект для предзаполнения; includeStatus — показывать ли выбор статуса.
    function objFormInner(o, includeStatus) {
      o = o || {};
      const opt = (v, cur) => `<option ${String(v) === String(cur || "") ? "selected" : ""}>${esc(v)}</option>`;
      const typeOpts = `<option value="">—</option>` + OBJ_TYPES.map(v => opt(v, o.type)).join("");
      const condOpts = `<option value="">—</option>` + OBJ_CONDITIONS.map(v => opt(v, o.condition)).join("");
      const distOpts = `<option value="">—</option>` + refs.district.map(x => opt(x.value, o.district)).join("");
      const statusOpts = [["active", "Активен"], ["deposit", "Задаток"], ["sold", "Продан"]]
        .map(s => `<option value="${s[0]}" ${s[0] === (o.status || "active") ? "selected" : ""}>${s[1]}</option>`).join("");
      const cur = o.currency || agencySettings.default_currency || "USD";
      const curOpts = ["USD", "UZS", "EUR"].map(c => `<option ${c === cur ? "selected" : ""}>${c}</option>`).join("");
      const num = v => (v != null ? v : "");
      return `
        <label>Наименование</label><input id="n-name" value="${esc(o.name || "")}" placeholder="например, 2-комн. в центре" />
        <label>Тип объекта</label><select id="n-type">${typeOpts}</select>
        ${includeStatus ? `<label>Статус</label><select id="n-status">${statusOpts}</select>` : ""}
        <label>Район</label><select id="n-district">${distOpts}</select>
        <label>Адрес</label><input id="n-address" value="${esc(o.address || "")}" />
        <div style="display:flex; gap:8px">
          <div style="flex:1"><label>Комнат</label><input id="n-rooms" inputmode="numeric" value="${num(o.rooms)}" /></div>
          <div style="flex:1"><label>Этаж</label><input id="n-floor" inputmode="numeric" value="${num(o.floor)}" /></div>
          <div style="flex:1"><label>Этажей</label><input id="n-tfloors" inputmode="numeric" value="${num(o.total_floors)}" /></div>
        </div>
        <div style="display:flex; gap:8px">
          <div style="flex:1"><label>Площадь, м²</label><input id="n-area" inputmode="decimal" value="${num(o.area)}" /></div>
          <div style="flex:1"><label>Цена</label><input id="n-price" inputmode="numeric" value="${num(o.price)}" /></div>
          <div style="flex:1"><label>Валюта</label><select id="n-currency">${curOpts}</select></div>
        </div>
        <label>Состояние объекта</label><select id="n-condition">${condOpts}</select>
        <label>Телефон</label><input id="n-phone" value="${esc(o.phone || "")}" />
        <label>Описание</label><input id="n-desc" value="${esc(o.description || "")}" />`;
    }

    function toggleObjForm(host) {
      const box = host.querySelector("#obj-form");
      if (box.innerHTML.trim()) { box.innerHTML = ""; return; }
      box.innerHTML = `
        <div class="item" style="background:#fbfbfe">
          ${objFormInner(null, true)}
          <button class="full" id="n-save">Сохранить объект</button>
        </div>`;
      box.querySelector("#n-save").addEventListener("click", () => createObject(host));
    }

    function vNum(host, sel, isFloat) {
      const el = host.querySelector(sel);
      const v = ((el && el.value) || "").trim();
      if (!v) return null;
      const n = isFloat ? parseFloat(v) : parseInt(v, 10);
      return isNaN(n) ? null : n;
    }
    function vStr(host, sel) {
      const el = host.querySelector(sel);
      const v = ((el && el.value) || "").trim();
      return v || null;
    }

    // Собрать тело запроса из полей формы (общее для создания и редактирования).
    // full=true (редактирование): включаем ВСЕ поля, даже пустые (как null),
    // чтобы можно было очистить ранее заполненное поле. full=false (создание):
    // пустые поля не отправляем.
    function collectObjBody(host, includeStatus, full) {
      const body = {};
      const fields = {
        name: vStr(host, "#n-name"),
        type: vStr(host, "#n-type"),
        district: vStr(host, "#n-district"),
        address: vStr(host, "#n-address"),
        rooms: vNum(host, "#n-rooms", false),
        floor: vNum(host, "#n-floor", false),
        total_floors: vNum(host, "#n-tfloors", false),
        area: vNum(host, "#n-area", true),
        price: vNum(host, "#n-price", true),
        currency: host.querySelector("#n-currency").value,
        condition: vStr(host, "#n-condition"),
        phone: vStr(host, "#n-phone"),
        description: vStr(host, "#n-desc"),
      };
      if (includeStatus) fields.status = vStr(host, "#n-status");
      Object.keys(fields).forEach(k => {
        // Валюту никогда не обнуляем (она обязательна), остальное — по режиму.
        if (full && k === "currency" && !fields[k]) return;
        if (full || fields[k] !== null) body[k] = fields[k];
      });
      return body;
    }

    async function createObject(host) {
      const btn = host.querySelector("#n-save");
      const body = collectObjBody(host, true);
      btn.disabled = true; setStatus("Сохраняем объект…", "info");
      const r = await api("/api/v1/apartments", { method: "POST", body });
      btn.disabled = false;
      if (r.ok) {
        setStatus("Объект создан: №" + r.data.display_id, "ok");
        host.querySelector("#obj-form").innerHTML = "";
        searchObjects(host);
      } else {
        setStatus("Ошибка: " + errText(r.data, r.status), "err");
      }
    }

    // --- Список: карточка-сводка с кнопкой «Открыть» ---
    function objCardHtml(o) {
      const badge = STATUS_BADGE[o.status] || "gray";
      const label = STATUS_LABELS[o.status] || o.status;
      const price = (o.price != null) ? (o.price + " " + (o.currency || "")) : "—";
      const parts = [o.type, o.district, (o.rooms != null ? o.rooms + "-комн." : null)]
        .filter(Boolean).map(esc).join(" · ");
      return `<div class="item">
        <div class="top"><span class="title">№${esc(o.display_id)}</span><span class="badge ${badge}">${esc(label)}</span></div>
        ${o.name ? `<div class="meta">${esc(o.name)}</div>` : ""}
        <div class="meta">${parts || "—"}</div>
        <div class="meta">Цена: ${esc(String(price))}</div>
        ${o.created_by_name ? `<div class="meta">Добавил: ${esc(o.created_by_name)}</div>` : ""}
        <div style="margin-top:8px"><button class="small ghost" data-open="${o.id}">Открыть</button></div>
      </div>`;
    }

    // Собирает параметры фильтра/поиска (без пагинации).
    function buildObjQuery(host) {
      const p = new URLSearchParams();
      p.set("status", objView);
      pickedChips(host, "f-types").forEach(v => p.append("types", v));
      pickedChips(host, "f-districts").forEach(v => p.append("districts", v));
      pickedChips(host, "f-rooms").forEach(v => p.append("rooms", v));
      const fmin = vStr(host, "#f-fmin"), fmax = vStr(host, "#f-fmax");
      const pmin = vStr(host, "#f-pmin"), pmax = vStr(host, "#f-pmax");
      const q = vStr(host, "#f-q");
      if (fmin) p.set("floor_min", fmin);
      if (fmax) p.set("floor_max", fmax);
      if (pmin) p.set("price_min", pmin);
      if (pmax) p.set("price_max", pmax);
      if (q) p.set("q", q);
      return p;
    }

    // Привязывает обработчик «Открыть» к новым карточкам (без двойной привязки).
    function wireOpenButtons(host, container) {
      container.querySelectorAll("button[data-open]").forEach(b => {
        if (b.dataset.wired) return;
        b.dataset.wired = "1";
        b.addEventListener("click", () => openObject(host, parseInt(b.dataset.open, 10)));
      });
    }

    // append=false — новый поиск (сброс и перерисовка); append=true — догрузка.
    async function searchObjects(host, append) {
      const box = host.querySelector("#obj-results");
      if (!append) {
        objPage = { offset: 0, total: 0 };
        box.innerHTML = `
          <div class="meta" id="obj-count" style="margin:10px 0 0"></div>
          <div id="obj-cards"></div>
          <div id="obj-more"></div>`;
      }
      const moreBox = host.querySelector("#obj-more");
      if (moreBox) moreBox.innerHTML = `<div class="empty">Загрузка…</div>`;

      const p = buildObjQuery(host);
      p.set("limit", String(OBJ_PAGE_SIZE));
      p.set("offset", String(objPage.offset));
      const r = await api("/api/v1/apartments?" + p.toString());
      if (!r.ok) {
        if (moreBox) moreBox.innerHTML = `<div class="empty">Не удалось загрузить (${r.status}).</div>`;
        return;
      }
      const items = (r.data && r.data.items) || [];
      objPage.total = r.data.total || 0;
      objPage.offset += items.length;

      const cards = host.querySelector("#obj-cards");
      const countEl = host.querySelector("#obj-count");
      if (!append && !items.length) {
        if (countEl) countEl.textContent = "";
        cards.innerHTML = `<div class="empty">Ничего не найдено.</div>`;
        if (moreBox) moreBox.innerHTML = "";
        return;
      }
      if (countEl) countEl.textContent = "Найдено: " + objPage.total;
      const tmp = document.createElement("div");
      tmp.innerHTML = items.map(objCardHtml).join("");
      while (tmp.firstChild) cards.appendChild(tmp.firstChild);
      wireOpenButtons(host, cards);

      // Кнопка «Показать ещё», если показаны не все найденные объекты.
      const left = objPage.total - objPage.offset;
      if (left > 0) {
        moreBox.innerHTML = `<button class="ghost full" id="obj-more-btn">Показать ещё (${left})</button>`;
        moreBox.querySelector("#obj-more-btn").addEventListener("click", () => searchObjects(host, true));
      } else {
        moreBox.innerHTML = "";
      }
    }

    // --- Детальная карточка объекта ---
    async function openObject(host, id) {
      setStatus("Загрузка…", "info");
      const r = await api("/api/v1/apartments/" + id);
      if (!r.ok) { setStatus("Не удалось открыть объект (" + r.status + ").", "err"); return; }
      setStatus("", null);
      renderObjDetail(host, r.data);
    }

    // --- Готовая карточка объекта для пересылки клиенту (как в старом боте) ---
    function buildShareCard(o) {
      const lines = [];
      lines.push("🏠 Объект №" + (o.display_id || ""));
      if (o.name) lines.push("📋 " + o.name);
      if (o.type) lines.push("🏗 Тип: " + o.type);
      if (o.district) lines.push("📍 Район: " + o.district);
      if (o.address) lines.push("🗺 Адрес: " + o.address);
      if (o.rooms != null) lines.push("🚪 Комнат: " + o.rooms);
      const floorTxt = (o.floor != null && o.total_floors != null) ? (o.floor + "/" + o.total_floors)
        : (o.floor != null ? String(o.floor) : null);
      if (floorTxt) lines.push("🏢 Этаж: " + floorTxt);
      if (o.area != null) lines.push("📐 Площадь: " + o.area + " м²");
      if (o.condition) lines.push("🔧 Состояние: " + o.condition);
      if (o.price != null) lines.push("💵 Цена: " + o.price + " " + (o.currency || ""));
      if (o.phone) lines.push("📞 Телефон: " + o.phone);
      if (o.description) lines.push("📝 " + o.description);
      return lines.join("\n");
    }

    // Открыть диалог пересылки Telegram с готовым текстом карточки.
    function shareToTelegram(text) {
      const link = "https://t.me/share/url?url=&text=" + encodeURIComponent(text);
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.openTelegramLink) tg.openTelegramLink(link);
      else window.open(link, "_blank");
    }

    function renderObjDetail(host, o) {
      const badge = STATUS_BADGE[o.status] || "gray";
      const label = STATUS_LABELS[o.status] || o.status;
      const floorTxt = (o.floor != null && o.total_floors != null) ? (o.floor + " из " + o.total_floors)
        : (o.floor != null ? String(o.floor) : null);
      const rows = [
        ["Наименование", o.name],
        ["Тип", o.type],
        ["Район", o.district],
        ["Адрес", o.address],
        ["Комнат", o.rooms],
        ["Этаж", floorTxt],
        ["Площадь, м²", o.area],
        ["Цена", o.price != null ? (o.price + " " + (o.currency || "")) : null],
        ["Состояние", o.condition],
        ["Телефон", o.phone],
        ["Описание", o.description],
        ["Добавил", o.created_by_name],
      ];
      const rowsHtml = rows.filter(r => r[1] != null && r[1] !== "")
        .map(r => `<div class="row"><span>${r[0]}</span><span><b>${esc(String(r[1]))}</b></span></div>`).join("");
      const transitions = {
        active:   [["deposit", "Задаток"], ["sold", "Продан"], ["archived", "В архив"]],
        deposit:  [["active", "Снять задаток"], ["sold", "Продан"], ["archived", "В архив"]],
        sold:     [["active", "Вернуть в активные"], ["archived", "В архив"]],
        archived: [["active", "Вернуть в активные"]],
      };
      const statusBtns = (transitions[o.status] || [])
        .map(t => `<button class="small ghost" data-status="${t[0]}">${t[1]}</button>`).join(" ");
      const adminBtn = (state.user && state.user.role === "agency_admin")
        ? `<button class="small danger" id="d-del">Удалить</button>` : "";
      host.innerHTML = `
        <button class="ghost full" id="d-back">← Назад к списку</button>
        <div class="item">
          <div class="top"><span class="title">№${esc(o.display_id)}</span><span class="badge ${badge}">${esc(label)}</span></div>
          ${rowsHtml}
          <div style="margin-top:10px">${statusBtns}</div>
          <div style="margin-top:10px"><button class="ghost small" id="d-share">Скопировать карточку</button> <button class="ghost small" id="d-share-tg">Отправить в Telegram</button></div>
          <div style="margin-top:10px"><button class="ghost small" id="d-edit">Редактировать</button> ${adminBtn}</div>
        </div>`;
      host.querySelector("#d-back").addEventListener("click", () => objectsScreen(host));
      host.querySelector("#d-edit").addEventListener("click", () => renderObjEdit(host, o));
      const card = buildShareCard(o);
      host.querySelector("#d-share").addEventListener("click", () => copyText(card));
      host.querySelector("#d-share-tg").addEventListener("click", () => shareToTelegram(card));
      host.querySelectorAll("button[data-status]").forEach(b =>
        b.addEventListener("click", () => changeStatusDetail(host, o.id, b.dataset.status)));
      const del = host.querySelector("#d-del");
      if (del) del.addEventListener("click", () => deleteObjectDetail(host, o.id));
    }

    async function changeStatusDetail(host, id, newStatus) {
      setStatus("Меняем статус…", "info");
      const r = await api("/api/v1/apartments/" + id + "/status", { method: "POST", body: { status: newStatus } });
      if (r.ok) { setStatus("Готово.", "ok"); openObject(host, id); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    async function deleteObjectDetail(host, id) {
      if (!window.confirm("Удалить объект безвозвратно?")) return;
      setStatus("Удаляем…", "info");
      const r = await api("/api/v1/apartments/" + id, { method: "DELETE" });
      if (r.ok) { setStatus("Объект удалён.", "ok"); objectsScreen(host); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    function renderObjEdit(host, o) {
      host.innerHTML = `
        <button class="ghost full" id="e-cancel">← Отмена</button>
        <h2>Редактирование №${esc(o.display_id)}</h2>
        <div class="item" style="background:#fbfbfe">
          ${objFormInner(o, false)}
          <div class="hint">Чтобы очистить поле — сотрите его содержимое и нажмите «Сохранить изменения».</div>
          <button class="full" id="e-save">Сохранить изменения</button>
        </div>`;
      host.querySelector("#e-cancel").addEventListener("click", () => openObject(host, o.id));
      host.querySelector("#e-save").addEventListener("click", () => saveObjEdit(host, o.id));
    }

    async function saveObjEdit(host, id) {
      const btn = host.querySelector("#e-save");
      const body = collectObjBody(host, false, true);
      btn.disabled = true; setStatus("Сохраняем…", "info");
      const r = await api("/api/v1/apartments/" + id, { method: "PATCH", body });
      btn.disabled = false;
      if (r.ok) { setStatus("Изменения сохранены.", "ok"); openObject(host, id); }
      else setStatus("Ошибка: " + errText(r.data, r.status), "err");
    }

    // ───────────────────── Форма вступления по коду ─────────────────────
    function showJoinForm(prefillCode) {
      subtitleEl.textContent = "Вступление в агентство";
      contentEl.innerHTML = `
        <label>Код приглашения от вашего агентства</label>
        <input id="invite-code" type="text" value="${esc(prefillCode || "")}" placeholder="например, AbC123xyz" />
        <button class="full" id="invite-join">Вступить в агентство</button>`;
      const input = document.getElementById("invite-code");
      const btn = document.getElementById("invite-join");
      async function doJoin() {
        const code = (input.value || "").trim();
        if (!code) { setStatus("Введите код приглашения.", "warn"); return; }
        btn.disabled = true; setStatus("Проверяем приглашение…", "info");
        const r = await redeem(state.initData, code);
        if (r.ok) {
          state.token = r.data.access_token;
          state.user = r.data.user;
          state.subscriptionActive = r.data.subscription_active;
          renderApp();
        } else {
          btn.disabled = false;
          setStatus("Не удалось вступить: " + ((r.data && r.data.detail) || ("ошибка " + r.status)), "err");
        }
      }
      btn.addEventListener("click", doJoin);
      return doJoin;
    }

    // ───────────────────── Старт ─────────────────────
    async function checkBackend() {
      try { const res = await fetch("/health"); const d = await res.json(); return d.database === "connected"; }
      catch (e) { return false; }
    }

    async function main() {
      const tg = window.Telegram && window.Telegram.WebApp;
      if (tg) { try { tg.ready(); tg.expand(); } catch (e) {} }

      state.initData = (tg && tg.initData) ? tg.initData : "";
      state.startParam = (tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param) || "";

      if (!state.initData) {
        const backendOk = await checkBackend();
        setStatus(backendOk
          ? "✅ Страница работает и видит backend. Чтобы войти — открой приложение внутри Telegram."
          : "⚠️ Страница загрузилась, но не может связаться с backend. Проверь, что контейнеры запущены.",
          backendOk ? "ok" : "warn");
        contentEl.innerHTML = `
          <div class="row"><span>Открыто в Telegram</span><span><b>Нет (обычный браузер)</b></span></div>
          <div class="row"><span>Связь с backend</span><span><b>${backendOk ? "Есть" : "Нет"}</b></span></div>`;
        return;
      }

      setStatus("Выполняем вход через Telegram…", "info");
      try {
        const r = await login(state.initData);
        if (r.ok) {
          state.token = r.data.access_token;
          state.user = r.data.user;
          state.subscriptionActive = r.data.subscription_active;
          renderApp();
          return;
        }
        if (r.status === 403) {
          // Пользователь ещё не в агентстве — предлагаем вступить по коду.
          setStatus("Вы пока не в агентстве. Введите код приглашения, чтобы вступить.", "info");
          const doJoin = showJoinForm(state.startParam);
          if (state.startParam) doJoin();
          return;
        }
        setStatus("Войти не удалось: " + ((r.data && r.data.detail) || ("ошибка " + r.status)), "err");
        debugEl.innerHTML = "<pre>" + esc(JSON.stringify(r.data, null, 2)) + "</pre>";
      } catch (e) {
        setStatus("Ошибка при входе: " + e.message, "err");
      }
    }

    main();
  </script>
</body>
</html>
