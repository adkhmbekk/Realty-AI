<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Realty AI</title>
    <!--
      Официальный скрипт Telegram Mini App. Subresource Integrity (SRI) здесь
      НАМЕРЕННО не задаётся: Telegram обновляет этот файл «на месте» по
      неизменному URL без версии, поэтому фиксированный integrity-хэш ломал бы
      приложение после каждого их обновления. Контроль целостности обеспечивает
      Content-Security-Policy (script-src 'self' https://telegram.org), заданный
      на уровне веб-сервера (см. frontend/Caddyfile): сторонние скрипты грузить
      запрещено.
    -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
