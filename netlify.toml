# Netlify: собранный React-фронтенд Realty AI (только «витрина»).
#
# ВАЖНО: «движок» (backend FastAPI + PostgreSQL + фото + ИИ + фоновые задачи)
# на Netlify НЕ работает — он остаётся на офисном сервере за ngrok. Netlify
# отдаёт статическую страницу, а все запросы /api/* СЕРВЕРНО проксирует на
# backend (тот же ngrok-адрес). Браузер при этом видит ОДИН origin (netlify),
# поэтому CORS не нужен и строгий CSP (connect-src 'self') продолжает работать.
#
# Как задеплоить: в Netlify → Add new site → Import from GitHub → выбрать репо
# Realty-AI. Эти настройки подхватятся автоматически из netlify.toml.

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Совпадает с Dockerfile фронтенда (node:20-alpine).
  NODE_VERSION = "20"

# ─── API → серверный прокси на backend (ngrok) ──────────────────────────────
# Браузер зовёт /api/... на адресе netlify (тот же origin, что и страница),
# а Netlify незаметно проксирует это на backend. Без CORS, без правки backend.
# Если публичный адрес backend сменится — поменять ТОЛЬКО строку ниже.
[[redirects]]
  from = "/api/*"
  to = "https://pagan-crawling-retiring.ngrok-free.dev/api/:splat"
  status = 200
  force = true

# ─── SPA: любой путь отдаёт index.html (клиентская навигация React) ──────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Заголовки безопасности (повторяют то, что раньше ставил Caddy) ──────────
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # frame-ancestors — встраивание разрешено только клиентам Telegram (Mini App).
    Content-Security-Policy = "default-src 'self'; base-uri 'none'; object-src 'none'; frame-ancestors https://*.telegram.org https://telegram.org; script-src 'self' https://telegram.org; connect-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; font-src 'self' data:; form-action 'self'"

# index.html не кэшируем — иначе Telegram показывает старую версию после обновления.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

# Хэшированные ассеты (имя меняется при сборке) — кэшируем надолго.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
